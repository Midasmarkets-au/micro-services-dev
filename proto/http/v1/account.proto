}

// 活动报告生成请求
message GetActivityReportRequest {
  int64  id   = 1; // 账户 ID
  message Spec {
    optional string date_from = 1; // 报告起始日期（ISO 8601）
    optional string date_to   = 2; // 报告截止日期（ISO 8601）
    optional string type      = 3; // 报告类型（如 "pdf"、"excel"）
  }
  Spec spec = 2;
}

// MT 账户组名列表查询请求（Tenant 视角）
message GetAccountGroupNamesRequest {
  optional int32  type     = 1; // MT 服务类型（1=MT4，2=MT5）
  optional string keywords = 2; // 按组名关键字模糊搜索
}

// 账户分配/变更请求（assign/change/remove）
message AssignAccountRequest {
  int64 id         = 1; // 被操作账户 ID
  int64 target_uid = 2; // 目标 Sales/Agent 账户 UID
}

// 变更 Agent 组名请求
message ChangeAgentGroupNameRequest {
  int64  id   = 1; // 账户 ID
  message Spec {
    string group_name = 1; // 新的 MT 账户组别名
  }
  Spec spec = 2;
}

// 重命名 Tenant 自定义分组请求
message RenameGroupRequest {
  int64  group_id = 1; // 分组 ID
  message Spec {
    string name = 1; // 新分组名称
  }
  Spec spec = 2;
}

// 推荐码列表查询请求
message ListReferralsRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2; // 按账户 ID 过滤
  optional string   code       = 3; // 按推荐码字符串过滤
  optional int32    page       = 4; // 兼容前端直接传 page
  optional int32    size       = 5; // 兼容前端直接传 size
}

// 推荐码列表响应
message ListReferralsResponse {
  repeated ReferralCode items = 1;
  PaginationMeta        criteria  = 2;
}

// 按推荐码查询账户详情请求
message GetReferralByCodeRequest {
  string code = 1; // 推荐码字符串
}

// 推荐码账户详情响应
message ReferralDetailResponse {
  int64  account_id  = 1; // 关联账户 ID
  int64  uid         = 2; // 关联账户 UID
  string code        = 3; // 推荐码
  int32  type        = 4; // 推荐码类型
}

// 推荐码使用历史查询请求
message ListReferralHistoryRequest {
  PaginationRequest pagination = 1;
  optional string   code       = 2; // 按推荐码过滤
  optional int64    account_id = 3; // 按账户 ID 过滤
  optional string   date_from  = 4; // ISO 8601 格式
  optional string   date_to    = 5; // ISO 8601 格式
  optional int32    page       = 6; // 兼容前端直接传 page
  optional int32    size       = 7; // 兼容前端直接传 size
}

// 推荐码使用历史响应
message ListReferralHistoryResponse {
  repeated ReferralHistoryItem items = 1;
  PaginationMeta               criteria  = 2;
}

// 单条推荐码使用历史记录
message ReferralHistoryItem {
  int64  id          = 1;
  string code        = 2; // 推荐码
  int64  account_id  = 3; // 使用该推荐码注册的账户 ID
  int64  uid         = 4; // 使用该推荐码注册的账户 UID
  string created_on  = 5; // ISO 8601 注册时间
}

// 新增推荐码请求
message AddReferralCodeRequest {
  int64  account_id = 1; // 所属账户 ID
  string code       = 2; // 推荐码字符串
  int32  type       = 3; // 推荐码类型
  bool   is_default = 4; // 是否设为默认推荐码
}

// 更新推荐码默认支付方式请求
message UpdateReferralPaymentMethodsRequest {
  int64  id = 1; // 推荐码 ID
  message Spec {
    repeated int64 payment_method_ids = 1; // 支付方式 ID 列表（全量覆盖）
    string         type               = 2; // 支付方式类型（如 "deposit"/"withdrawal"）
  }
  Spec spec = 2;
}

// 沟通记录列表查询请求
message ListCommunicationsRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2; // 按账户 ID 过滤
  optional string   keywords   = 3; // 按内容关键字搜索
  optional string   date_from  = 4; // ISO 8601 格式
  optional string   date_to    = 5; // ISO 8601 格式
  optional int64    row_id     = 6; // 兼容前端传 rowId（等同 account_id）
  optional int32    type       = 7; // 沟通类型过滤（前端传 type）
  optional int32    page       = 8; // 兼容前端直接传 page
  optional int32    size       = 9; // 兼容前端直接传 size
}

// 沟通记录列表响应
message ListCommunicationsResponse {
  repeated CommunicationItem items = 1;
  PaginationMeta             criteria  = 2;
}

// 单条沟通记录
message CommunicationItem {
  int64  id         = 1;
  int64  account_id = 2;
  string content    = 3;  // 沟通内容
  string created_on = 4;  // ISO 8601 创建时间
  string created_by = 5;  // 操作人名称
}

// 账户余额变更审计查询请求
message ListAccountBalanceAuditsRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2; // 按账户 ID 过滤
  optional string   date_from  = 3; // ISO 8601 格式
  optional string   date_to    = 4; // ISO 8601 格式
  optional int32    page       = 5; // 兼容前端直接传 page
  optional int32    size       = 6; // 兼容前端直接传 size
}

// 账户余额变更审计响应
message ListAccountBalanceAuditsResponse {
  repeated AccountBalanceAuditItem items = 1;
  PaginationMeta                   criteria  = 2;
}

// 单条余额变更审计记录
message AccountBalanceAuditItem {
  int64  id          = 1;
  int64  account_id  = 2;
  int64  uid         = 3;
  double amount      = 4;  // 变更金额（正=入账，负=扣款）
  int32  currency_id = 5;  // 货币 ID
  string reason      = 6;  // 变更原因
  string created_on  = 7;  // ISO 8601 操作时间
  string created_by  = 8;  // 操作人
}

// 子账户网络统计查询请求（Tenant 视角）
message GetTenantChildNetStatRequest {
  int64           uid         = 1; // 目标账户 UID
  optional string date_from   = 2; // ISO 8601 格式（也接受 dateFrom）
  optional string date_to     = 3; // ISO 8601 格式（也接受 dateTo）
  bool            view_client = 4; // true=统计包含最底层客户账户
  optional string from        = 5; // 兼容前端传 from（等同 date_from）
  optional string to          = 6; // 兼容前端传 to（等同 date_to）
}

// 按品种分组的统计查询请求（Tenant 视角）
message GetTenantChildStatByRangeRequest {
  int64           uid       = 1; // 目标账户 UID
  optional string date_from = 2; // ISO 8601 格式
  optional string date_to   = 3; // ISO 8601 格式
  optional string from      = 4; // 兼容前端传 from（等同 date_from）
  optional string to        = 5; // 兼容前端传 to（等同 date_to）
}
