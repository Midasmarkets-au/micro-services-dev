  int64  uid       = 2; // 目标账户 UID
  string code      = 3; // 从 GetViewEmailCode 获取的一次性验证码
}

// Agent 账户列表查询请求
message ListAgentAccountsRequest {
  int64             agent_uid  = 1; // IB（Agent）账户 UID
  PaginationRequest pagination = 2;
  optional string   keywords   = 3; // 按姓名或邮箱模糊搜索
  optional int32    status     = 4; // 按账户状态过滤
}

// Agent 单账户查询请求
message GetAgentAccountRequest {
  int64 agent_uid = 1; // IB（Agent）账户 UID
  int64 uid       = 2; // 目标账户 UID
}

// 子账户网络统计查询请求（Agent 视角）
message GetAgentChildNetStatRequest {
  int64           agent_uid  = 1; // IB（Agent）账户 UID
  int64           uid        = 2; // 目标账户 UID
  optional string date_from  = 3; // ISO 8601 格式
  optional string date_to    = 4; // ISO 8601 格式
  bool            view_client = 5; // true=统计包含最底层客户账户
}

// 按品种分组的统计查询请求（Agent 视角）
message GetAgentChildStatByRangeRequest {
  int64           agent_uid = 1; // IB（Agent）账户 UID
  int64           uid       = 2; // 目标账户 UID
  optional string date_from = 3; // ISO 8601 格式
  optional string date_to   = 4; // ISO 8601 格式
}

// 使用验证码查看邮箱请求（Agent 视角）
message GetAgentViewEmailRequest {
  int64  agent_uid = 1; // IB（Agent）账户 UID
  int64  uid       = 2; // 目标账户 UID
  string code      = 3; // 从 GetViewEmailCode 获取的一次性验证码
}

// Rep 账户列表查询请求
message ListRepAccountsRequest {
  int64             rep_uid    = 1; // Rep 账户 UID
  PaginationRequest pagination = 2;
  optional string   keywords   = 3; // 按姓名或邮箱模糊搜索
  optional int32    status     = 4; // 按账户状态过滤
}

// Rep 单账户查询请求
message GetRepAccountRequest {
  int64 rep_uid = 1; // Rep 账户 UID
  int64 uid     = 2; // 目标账户 UID
}

// MT 组名列表查询请求
message GetGroupNameListRequest {
  int64           rep_uid   = 1; // Rep 账户 UID
  optional int32  type      = 2; // 按 MT 服务类型过滤（1=MT4，2=MT5）
  optional string keywords  = 3; // 按组名关键字搜索
}

// MT 组名列表响应
message GroupNameListResponse {
  repeated string names = 1; // MT 账户组名称列表
}

// 子账户网络统计查询请求（Rep 视角）
message GetRepChildNetStatRequest {
  int64           rep_uid   = 1; // Rep 账户 UID
  int64           uid       = 2; // 目标账户 UID
  optional string date_from = 3; // ISO 8601 格式
  optional string date_to   = 4; // ISO 8601 格式
  bool            view_client = 5; // true=统计包含最底层客户账户
}

// 按品种分组的统计查询请求（Rep 视角）
message GetRepChildStatByRangeRequest {
  int64           rep_uid   = 1; // Rep 账户 UID
  int64           uid       = 2; // 目标账户 UID
  optional string date_from = 3; // ISO 8601 格式
  optional string date_to   = 4; // ISO 8601 格式
}
