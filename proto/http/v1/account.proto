}

// Sales 推荐路径查询请求
message GetSalesReferralPathRequest {
  int64 sales_uid = 1; // Sales 账户 UID
  int64 uid       = 2; // 目标账户 UID
}

// 推荐层级路径响应
message ReferralPathResponse {
