  }
}

// ─── Messages ────────────────────────────────────────────────────────────────

message EmptyRequest {}

// Account 实体（简化，含关键标识字段）
message Account {
  int64  id          = 1;
  string name        = 2;
  string email       = 3;
  int32  status      = 4;  // AccountStatus enum value
  int32  role        = 5;  // AccountRoleTypes enum value
  int32  fund_type   = 6;
  int64  tenant_id   = 7;
  int64  party_id    = 8;
  string created_at  = 9;  // ISO 8601
  string updated_at  = 10;
}

// Tenant 账户列表请求
message ListAccountsRequest {
  PaginationRequest pagination  = 1;
  optional string   keywords    = 2;
  optional int32    status      = 3;
  optional int64    uid         = 4;
  repeated int64    uids        = 5;
  optional int32    role        = 6;
  optional string   date_from   = 7;
  optional string   date_to     = 8;
  optional int64    party_id    = 9;
  optional int32    fund_type   = 10;
}

message ListAccountsResponse {
  repeated Account data = 1;
  PaginationMeta   meta = 2;
}

message GetAccountRequest {
  int64 id = 1;
}

// 账户日志列表请求
message ListAccountLogsRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2;
  optional string   action     = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

message ListAccountLogsResponse {
  repeated AccountLog data = 1;
  PaginationMeta      meta = 2;
}

message AccountLog {
  int64  id         = 1;
  int64  account_id = 2;
  string action     = 3;
  string detail     = 4;
  string created_at = 5;
}

message LogActionsResponse {
  repeated string actions = 1;
}

message UpdateAccountTypeRequest {
  int64             id  = 1;
  UpdateAccountType spec = 2;
}

message UpdateAccountType {
  int32 type = 1;
}

message UpdateAccountSiteRequest {
  int64            id   = 1;
  UpdateAccountSite spec = 2;
}

message UpdateAccountSite {
  int32 site_id = 1;
}

message UpdateAccountStatusRequest {
  int64              id      = 1;
  int32              status  = 2;
  WithCommentSpec    spec    = 3;
}

message WithCommentSpec {
  string comment = 1;
}

message UpdateAccountTagsRequest {
  int64         id   = 1;
  UpdateTagSpec spec = 2;
}

message UpdateTagSpec {
  repeated string tags = 1;
}

message UpdateHasLevelRuleRequest {
  int64 id             = 1;
  bool  has_level_rule = 2;
}

message UpdateFundTypeRequest {
  int64 id        = 1;
  int32 fund_type = 2;
}

message LevelSettingResponse {
  repeated LevelSetting items = 1;
}

message LevelSetting {
  int32  level      = 1;
  string name       = 2;
  double amount     = 3;
}

message ReferralCodesResponse {
  repeated ReferralCode items = 1;
}

message ReferralCode {
  string code       = 1;
  int32  type       = 2;
  bool   is_default = 3;
}

message AccountWizardResponse {
  int32 step         = 1;
  bool  completed    = 2;
}

message GetMtGroupSymbolRequest {
  int32  service_id = 1;
  string group      = 2;
  string symbol     = 3;
  int32  trans_id   = 4;
}

message MtGroupSymbolResponse {
  repeated string items = 1;
}

message CheckAccountNumberRequest {
  int64 account_number = 1;
}

message CheckAccountNumberResponse {
  bool   valid   = 1;
  string message = 2;
}

message ChangeAccountNumberRequest {
  int64 id             = 1;
  int64 account_number = 2;
}

message IbToSalesRequest {
  int64  uid       = 1;
  string code      = 2;
  int32  real_code = 3;
}

// V2 Tenant messages
message ConfirmAutoCreateRequest {
  int64 id = 1;
}

message AssignWalletRequest {
  int64 id        = 1;
  int64 wallet_id = 2;
}

message GetAccountTradeStatRequest {
  int64           id        = 1;
  optional string date_from = 2;
  optional string date_to   = 3;
}

message GetMultiAccountTradeStatRequest {
  repeated int64  account_numbers = 1;
  optional string date_from       = 2;
  optional string date_to         = 3;
}

message TradeStatResponse {
  double volume      = 1;
  double profit      = 2;
  int32  trade_count = 3;
}

message GetDailyReportRequest {
  int64  account_number = 1;
  string date           = 2;
}

message DailyReportResponse {
  string date    = 1;
  double balance = 2;
  double equity  = 3;
}

message GetStatTopRequest {
  optional string date_from      = 1;
  optional string date_to        = 2;
  optional int64  account_number = 3;
  int32           count          = 4;
}

message StatTopResponse {
  repeated StatTopItem items = 1;
}

message StatTopItem {
  int64  account_id = 1;
  string name       = 2;
  double value      = 3;
}

// Client Account messages
message ListClientAccountsRequest {
  PaginationRequest pagination  = 1;
  optional string   keywords    = 2;
  optional int32    status      = 3;
  optional string   date_from   = 4;
  optional string   date_to     = 5;
}

message CreateDemoAccountRequest {
  string account_type = 1;
  double initial_deposit = 2;
  int32  leverage     = 3;
}

message ApplicationConfigResponse {
  repeated AccountTypeConfig types = 1;
}

message AccountTypeConfig {
  int32  id   = 1;
  string name = 2;
}

message GetAccountTypeByReferralRequest {
  string code = 1;
}

message AccountTypesResponse {
  repeated AccountTypeConfig types = 1;
}

message AccountConfigResponse {
  int64  account_id      = 1;
  int32  leverage        = 2;
  bool   transfer_enabled = 3;
}

message ChangeLeverageRequest {
  int64              id   = 1;
  ChangeLeverageSpec spec = 2;
}

message ChangeLeverageSpec {
  int32 leverage = 1;
}

message ChangePasswordRequest {
  int64              id   = 1;
  ChangePasswordSpec spec = 2;
}

message ChangePasswordSpec {
  string password     = 1;
  string old_password = 2;
}

message GetPaymentStatusRequest {
  int64  id             = 1;
  string payment_number = 2;
}

message PaymentStatusResponse {
  int32  status  = 1;
  string message = 2;
}

message ListDepositsRequest {
  int64             account_uid = 1;
  PaginationRequest pagination  = 2;
  optional string   date_from   = 3;
  optional string   date_to     = 4;
  optional int32    status      = 5;
}

message ListDepositsResponse {
  repeated Deposit data = 1;
  PaginationMeta   meta = 2;
}

message Deposit {
  int64  id          = 1;
  string hash_id     = 2;
  int64  account_uid = 3;
  double amount      = 4;
  string currency    = 5;
  int32  status      = 6;
  string created_at  = 7;
}

message CreateDepositRequest {
  int64             account_uid = 1;
  CreateDepositSpec spec        = 2;
}

message CreateDepositSpec {
  int64  payment_method_id = 1;
  double amount            = 2;
  string currency          = 3;
}

message GetDepositGuideRequest {
  int64  account_uid     = 1;
  string deposit_hash_id = 2;
}

message DepositGuideResponse {
  string instructions = 1;
}

message GetDepositReceiptRequest {
  int64  account_uid     = 1;
  string deposit_hash_id = 2;
}

message DepositReceiptResponse {
