syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Account API (api/v1/tenant/account) ─────────────────────────────

service TenantAccountService {
  // 列表查询
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account" };
  }
  // 获取单条
  rpc GetAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}" };
  }
  // 刷新账户
  rpc RefreshAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}/refresh" };
  }
  // 获取账户日志
  rpc ListAccountLogs(ListAccountLogsRequest) returns (ListAccountLogsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/log" };
  }
  // 获取日志动作枚举
  rpc GetLogActions(EmptyRequest) returns (LogActionsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/log-actions" };
  }
  // 更新账户类型
  rpc UpdateAccountType(UpdateAccountTypeRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/type", body: "spec" };
  }
  // 更新站点
  rpc UpdateAccountSite(UpdateAccountSiteRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/site", body: "spec" };
  }
  // 更新状态
  rpc UpdateAccountStatus(UpdateAccountStatusRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/status/{status}", body: "spec" };
  }
  // 更新标签
  rpc UpdateAccountTags(UpdateAccountTagsRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/tags", body: "spec" };
  }
  // 更新是否有等级规则
  rpc UpdateHasLevelRule(UpdateHasLevelRuleRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/has-level-rule" };
  }
  // 更新资金类型
  rpc UpdateFundType(UpdateFundTypeRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v1/tenant/account/{id}/fund-type" };
  }
  // 获取等级设置
  rpc GetLevelSetting(GetAccountRequest) returns (LevelSettingResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}/level-setting" };
  }
  // 获取推荐码列表
  rpc GetReferralCodes(GetAccountRequest) returns (ReferralCodesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}/referral-codes" };
  }
  // 获取向导数据
  rpc GetAccountWizard(GetAccountRequest) returns (AccountWizardResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}/wizard" };
  }
  // MT 组合品种查询
  rpc GetMtGroupSymbol(GetMtGroupSymbolRequest) returns (MtGroupSymbolResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/mt-group-symbol" };
  }
  // 校验账户号码
  rpc CheckAccountNumber(CheckAccountNumberRequest) returns (CheckAccountNumberResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/account/check-account-number/{account_number}" };
  }
  // 更改账户号码
  rpc ChangeAccountNumber(ChangeAccountNumberRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/tenant/account/{id}/change-account-number/{account_number}" };
  }
  // IB 转 Sales 操作
  rpc IbToSales(IbToSalesRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/tenant/account/ib-to-sales/{uid}/{code}/{real_code}" };
  }
}

// ─── Tenant Account V2 API (api/v2/tenant/account) ──────────────────────────

service TenantAccountServiceV2 {
  // 确认自动创建账户
  rpc ConfirmAutoCreate(ConfirmAutoCreateRequest) returns (Account) {
    option (google.api.http) = { post: "/api/v2/tenant/account/{id}/confirm-auto-create" };
  }
  // 分配钱包
  rpc AssignWallet(AssignWalletRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v2/tenant/account/{id}/assign-wallet/{wallet_id}" };
  }
  // 获取账户交易统计
  rpc GetAccountTradeStat(GetAccountTradeStatRequest) returns (TradeStatResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/account/{id}/trade/stat" };
  }
  // 获取多账户交易统计
  rpc GetMultiAccountTradeStat(GetMultiAccountTradeStatRequest) returns (TradeStatResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/account/trade/stat" };
  }
  // 获取账户日报
  rpc GetDailyReport(GetDailyReportRequest) returns (DailyReportResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/account/daily-report/{account_number}" };
  }
  // 启用转账
  rpc EnableTransfer(GetAccountRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v2/tenant/account/{id}/enable-transfer" };
  }
  // 禁用转账
  rpc DisableTransfer(GetAccountRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v2/tenant/account/{id}/disable-transfer" };
  }
  // 获取顶级账户统计
  rpc GetStatTop(GetStatTopRequest) returns (StatTopResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/account/stat-top" };
  }
}

// ─── Client Account API (api/v1/client/account) ─────────────────────────────

service ClientAccountService {
  // 列表查询
  rpc ListAccounts(ListClientAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/client/account" };
  }
  // 获取单条
  rpc GetAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/client/account/{id}" };
  }
  // 获取向导数据
  rpc GetAccountWizard(GetAccountRequest) returns (AccountWizardResponse) {
    option (google.api.http) = { get: "/api/v1/client/account/{id}/wizard" };
  }
  // 刷新账户
  rpc RefreshAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/client/account/{id}/refresh" };
  }
}

// ─── Client Account V2 API (api/v2/client/account) ──────────────────────────

service ClientAccountServiceV2 {
  // 列表查询
  rpc ListAccounts(ListClientAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/api/v2/client/account" };
  }
  // 获取模拟账户列表
  rpc ListDemoAccounts(ListClientAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/demo" };
  }
  // 创建模拟账户
  rpc CreateDemoAccount(CreateDemoAccountRequest) returns (Account) {
    option (google.api.http) = { post: "/api/v2/client/account/demo", body: "*" };
  }
  // 获取开户配置
  rpc GetApplicationConfig(EmptyRequest) returns (ApplicationConfigResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/application-config" };
  }
  // 获取模拟账户开户配置
  rpc GetDemoApplicationConfig(EmptyRequest) returns (ApplicationConfigResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/demo/application-config" };
  }
  // 按推荐码获取账户类型
  rpc GetAccountTypeByReferral(GetAccountTypeByReferralRequest) returns (AccountTypesResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/type/referral" };
  }
  // 获取账户配置
  rpc GetAccountConfig(GetAccountRequest) returns (AccountConfigResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{id}/config" };
  }
  // 设置为默认父账户
  rpc SetDefaultParent(GetAccountRequest) returns (Account) {
    option (google.api.http) = { put: "/api/v2/client/account/{id}/default-parent" };
  }
  // 修改杠杆
  rpc ChangeLeverage(ChangeLeverageRequest) returns (Account) {
    option (google.api.http) = { post: "/api/v2/client/account/{id}/change-leverage", body: "spec" };
  }
  // 修改交易密码
  rpc ChangePassword(ChangePasswordRequest) returns (Account) {
    option (google.api.http) = { post: "/api/v2/client/account/{id}/change-password", body: "spec" };
  }
  // 查询支付状态
  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (PaymentStatusResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{id}/payment/{payment_number}/status" };
  }
  // 查询充值列表
  rpc ListDeposits(ListDepositsRequest) returns (ListDepositsResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{account_uid}/deposit" };
  }
  // 创建充值
  rpc CreateDeposit(CreateDepositRequest) returns (Deposit) {
    option (google.api.http) = { post: "/api/v2/client/account/{account_uid}/deposit", body: "spec" };
  }
  // 获取充值引导
  rpc GetDepositGuide(GetDepositGuideRequest) returns (DepositGuideResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{account_uid}/deposit/{deposit_hash_id}/guide" };
  }
  // 获取充值回执
  rpc GetDepositReceipt(GetDepositReceiptRequest) returns (DepositReceiptResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{account_uid}/deposit/{deposit_hash_id}/receipt" };
  }
  // 查询提款列表
  rpc ListWithdrawals(ListWithdrawalsRequest) returns (ListWithdrawalsResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{account_uid}/withdrawal" };
  }
  // 创建提款
  rpc CreateWithdrawal(CreateWithdrawalRequest) returns (Withdrawal) {
    option (google.api.http) = { post: "/api/v2/client/account/{account_uid}/withdrawal", body: "spec" };
  }
  // 查询转账列表
  rpc ListTransfers(ListTransfersRequest) returns (ListTransfersResponse) {
    option (google.api.http) = { get: "/api/v2/client/account/{account_uid}/transfer" };
  }
}

// ─── Sales Account API (api/v1/sales/{salesUid}/account) ────────────────────

service SalesAccountService {
  // 列表查询
  rpc ListAccounts(ListSalesAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account" };
  }
  // 获取单条
  rpc GetAccount(GetSalesAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{uid}" };
  }
  // 获取 level 账户
  rpc GetLevelAccount(GetLevelAccountRequest) returns (Account) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{child_account_uid}/level-account" };
  }
  // 获取子账户统计
  rpc GetChildAccountStat(GetChildAccountStatRequest) returns (ChildStatResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{uid}/stat" };
  }
  // 获取子账户网络统计
  rpc GetChildNetStat(GetChildNetStatRequest) returns (ChildNetStatResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/child/stat" };
  }
  // 按品种分组获取返佣统计
  rpc GetChildRebateBySymbol(GetChildStatByRangeRequest) returns (SymbolGroupStatResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/child/stat/rebate/symbol-grouped" };
  }
  // 按品种分组获取交易统计
  rpc GetChildTradeBySymbol(GetChildStatByRangeRequest) returns (SymbolGroupStatResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/child/stat/trade/symbol-grouped" };
  }
  // 获取账户配置
  rpc GetAccountConfiguration(GetSalesAccountConfigRequest) returns (AccountConfigResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/configuration/{agent_uid}" };
  }
  // 获取默认等级设置
  rpc GetDefaultLevelSetting(GetSalesDefaultLevelRequest) returns (LevelSettingResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{agent_uid}/default-level-setting" };
  }
  // 获取可用账户类型
  rpc GetAvailableAccountTypes(GetSalesUidRequest) returns (AccountTypesResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/configuration/account-type-available" };
  }
  // 获取推荐路径
  rpc GetReferralPath(GetSalesReferralPathRequest) returns (ReferralPathResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/referralPath/{uid}" };
  }
  // 获取查看邮箱验证码
  rpc GetViewEmailCode(GetSalesAccountRequest) returns (EmailCodeResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{uid}/view-email-code" };
  }
  // 查看邮箱
  rpc GetViewEmail(GetViewEmailRequest) returns (EmailResponse) {
    option (google.api.http) = { get: "/api/v1/sales/{sales_uid}/account/{uid}/view-email/{code}" };
  }
}

