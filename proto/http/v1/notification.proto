syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";
option go_package = "proto/http/v1;httpv1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Message API (api/v1/tenant/message) ──────────────────────────────
// 管理站内信（Message）的完整生命周期：CRUD 及弹窗推送。
// 站内信与账户绑定，通过 SignalR 或 SSE 实时推送给前端。

service TenantMessageService {
  // 分页查询站内信列表；可按 account_id、type、status 及日期范围过滤
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/message" };
  }
  // 按 id 获取单条站内信详情
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/message/{id}" };
  }
  // 创建新站内信（body 为完整 Message 字段）
  rpc CreateMessage(CreateMessageRequest) returns (CreateMessageResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/message", body: "*" };
  }
  // 更新站内信（body 字段名为 spec）
  rpc UpdateMessage(UpdateMessageRequest) returns (UpdateMessageResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/message/{id}", body: "spec" };
  }
  // 删除站内信
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/message/{id}" };
  }
  // 向指定账户发送弹窗消息（通过 SignalR 实时推送）
  rpc SendPopupMessage(SendPopupMessageRequest) returns (SendPopupMessageResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/message/send-popup", body: "*" };
  }
}

// ─── Tenant Email API (api/v1/tenant/email) ──────────────────────────────────
// 提供 tenant 级别的邮件发送能力，包括调试邮件、单发、批量发送及退订名单管理。

// HTTP 路由全部由 MVC EmailController 处理，返回完整数据（含 SendBatchEmailInfo 全字段）
service TenantEmailService {
  rpc DebugEmail(DebugEmailRequest) returns (DebugEmailResponse) {}
  rpc SendToUser(SendToUserRequest) returns (SendToUserResponse) {}
  rpc CreateBatch(CreateBatchRequest) returns (CreateBatchResponse) {}
  rpc GetBatchInfo(GetBatchInfoRequest) returns (GetBatchInfoResponse) {}
  rpc GetBatchDetail(GetBatchDetailRequest) returns (GetBatchDetailResponse) {}
  rpc TestBatch(TestBatchRequest) returns (TestBatchResponse) {}
  rpc ConfirmBatch(ConfirmBatchRequest) returns (ConfirmBatchResponse) {}
  rpc CheckSuppression(CheckSuppressionRequest) returns (CheckSuppressionResponse) {}
  rpc RemoveSuppression(RemoveSuppressionRequest) returns (RemoveSuppressionResponse) {}
  rpc AddSuppression(AddSuppressionRequest) returns (AddSuppressionResponse) {}
  rpc ListEmailTemplates(ListEmailTemplatesRequest) returns (ListEmailTemplatesResponse) {}
  rpc GetBatchReceiverEmails(GetBatchReceiverEmailsRequest) returns (GetBatchReceiverEmailsResponse) {}
}

// ─── Tenant Topic API (api/v1/tenant/topic) ──────────────────────────────────
// 管理邮件/通知模板主题（Topic），每个 Topic 可包含多语言内容（TopicContent）。
// Topic 用于批量邮件（EmailBatch.topic_content_id）和站内信模板。

service TenantTopicService {
  // 分页查询 Topic 列表；可按 type、status、关键字过滤
  // HTTP 路由由 MVC TopicController 处理，返回完整 ResponseModel（含 contents/effectiveFrom/effectiveTo/updatedOn）
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse) {}
  // 按 id 获取 Topic（可指定 language 只返回该语言的内容）
  rpc GetTopic(GetTopicRequest) returns (GetTopicResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/topic/{id}" };
  }
  // 获取指定 Topic 已有的语言列表
  rpc GetTopicLanguages(GetTopicLanguagesRequest) returns (GetTopicLanguagesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/topic/{id}/languages" };
  }
  // 创建新 Topic（body 为完整字段）
  rpc CreateTopic(CreateTopicRequest) returns (CreateTopicResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/topic", body: "*" };
  }
  // 更新 Topic（body 字段名为 spec）
  rpc UpdateTopic(UpdateTopicRequest) returns (UpdateTopicResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/topic/{id}", body: "spec" };
  }
  // 将 Topic 移至废纸篓（软删，status 变更为 trash）
  rpc MoveToTrash(MoveToTrashRequest) returns (MoveToTrashResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/topic/{id}/move-to-trash" };
  }
  // 永久删除 Topic（不可恢复）
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/topic/{id}" };
  }
  // 为 Topic 创建指定语言的内容
  rpc CreateTopicContent(CreateTopicContentRequest) returns (CreateTopicContentResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/topic/{id}/content", body: "*" };
  }
  // 更新 Topic 指定语言的内容
  rpc UpdateTopicContent(UpdateTopicContentRequest) returns (UpdateTopicContentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/topic/{id}/content/{content_id}", body: "spec" };
  }
  // 删除 Topic 指定语言的内容
  rpc DeleteTopicContent(DeleteTopicContentRequest) returns (DeleteTopicContentResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/topic/{id}/content/{content_id}" };
  }
}

// ─── Messages ────────────────────────────────────────────────────────────────

// 站内信实体
message Message {
  int64  id         = 1; // 站内信 ID
  int64  account_id = 2; // 关联账户 ID
  string title      = 3; // 消息标题
  string body       = 4; // 消息正文（支持 HTML）
  int32  type       = 5; // 消息类型（枚举：1=info、2=warning、3=popup 等）
  int32  status     = 6; // 状态：0=unread、1=read、2=archived
  string created_at = 7; // 创建时间，ISO 8601 格式
}

// 批量邮件任务实体
message EmailBatch {
  int64  id         = 1; // 批次 ID
  string subject    = 2; // 邮件主题
  int32  status     = 3; // 状态：0=draft、1=pending、2=sending、3=completed、4=failed
  int32  total      = 4; // 收件人总数
  string created_at = 5; // 创建时间，ISO 8601 格式
}

// Topic（邮件/通知模板主题）实体
message Topic {
  int32  id         = 1; // Topic ID
  string title      = 2; // 主题标题
  int32  type       = 3; // 主题类型（枚举，如 1=email、2=notification）
  int32  status     = 4; // 状态：0=active、1=inactive、2=trash
  string created_at = 5; // 创建时间，ISO 8601 格式
}

// Topic 的多语言内容实体
message TopicContent {
  int32  id         = 1; // 内容记录 ID
  int32  topic_id   = 2; // 关联 Topic ID
  string language   = 3; // 语言代码，如 "en"、"zh"
  string content    = 4; // 内容正文（HTML 或纯文本）
}

// ─── TenantMessageService RPC 包装 ───────────────────────────────────────────

message GetMessageResponse {
  Message data = 1;
}

message CreateMessageResponse {
  Message data = 1;
}

message UpdateMessageResponse {
  Message data = 1;
}

message DeleteMessageRequest {
  int64 id = 1;
}

message DeleteMessageResponse {
  bool   success = 1;
  string message = 2;
}

message SendPopupMessageResponse {
  bool   success = 1;
  string message = 2;
}

// ─── TenantEmailService RPC 包装 ─────────────────────────────────────────────

message DebugEmailResponse {
  bool   success = 1;
  string message = 2;
}

message SendToUserResponse {
  bool   success = 1;
  string message = 2;
}

message CreateBatchResponse {
  EmailBatch data = 1;
}

message GetBatchInfoRequest {}

message GetBatchInfoResponse {
  int32 recipient_count = 1; // 符合条件的收件人数量
}

message GetBatchDetailRequest {}

message GetBatchDetailResponse {
  repeated string emails = 1; // 收件人邮箱列表
}

message TestBatchRequest {
  string test_email = 1; // 接收测试邮件的邮箱地址
}

message TestBatchResponse {
  bool   success = 1;
  string message = 2;
}

message ConfirmBatchResponse {
  bool   success = 1;
  string message = 2;
}

message CheckSuppressionResponse {
  bool   suppressed = 1; // true 表示该邮箱已退订
  string reason     = 2; // 退订原因说明
}

message RemoveSuppressionRequest {
  string email = 1;
}

message RemoveSuppressionResponse {
  bool   success = 1;
  string message = 2;
}

message AddSuppressionRequest {
  string email = 1;
}

message AddSuppressionResponse {
  bool   success = 1;
  string message = 2;
}

message ListEmailTemplatesResponse {
  repeated Topic       data     = 1;
  PaginationMeta       criteria = 2;
}

message GetBatchReceiverEmailsResponse {
  repeated string emails = 1; // 当前页收件人邮箱列表
  int32           total  = 2; // 符合条件的收件人总数
  int32           page   = 3; // 当前页码
}

// ─── TenantTopicService RPC 包装 ─────────────────────────────────────────────

message GetTopicResponse {
  Topic data = 1;
}

message GetTopicLanguagesRequest {
  int32 id = 1;
}

message GetTopicLanguagesResponse {
  repeated string languages = 1; // 可用语言列表
}

message CreateTopicResponse {
  Topic data = 1;
}

message UpdateTopicResponse {
  Topic data = 1;
}

message MoveToTrashRequest {
  int32 id = 1;
}

message MoveToTrashResponse {
  Topic data = 1;
}

message DeleteTopicRequest {
  int32 id = 1;
}

message DeleteTopicResponse {
  bool   success = 1;
  string message = 2;
}

message CreateTopicContentResponse {
  TopicContent data = 1;
}

message UpdateTopicContentResponse {
  TopicContent data = 1;
}

message DeleteTopicContentResponse {
  bool   success = 1;
  string message = 2;
}

// ─── Message 相关消息 ──────────────────────────────────────────────────────────

// 站内信列表查询
message ListMessagesRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_id  = 2; // 按账户 ID 过滤
  optional int32    type        = 3; // 按消息类型过滤
  optional int32    status      = 4; // 按状态过滤
  optional string   date_from   = 5; // ISO 8601 格式
  optional string   date_to     = 6; // ISO 8601 格式
}

message ListMessagesResponse {
  repeated Message data = 1;
  PaginationMeta   criteria = 2;
}

// 按 id 查询站内信
message GetMessageRequest {
  int64 id = 1;
}

// 创建站内信请求
message CreateMessageRequest {
  int64  account_id = 1; // 目标账户 ID
  string title      = 2;
  string body       = 3;
  int32  type       = 4; // 消息类型枚举
}

// 更新站内信请求
message UpdateMessageRequest {
  int64                id   = 1;
  CreateMessageRequest spec = 2;
}

// 弹窗消息发送请求
message SendPopupMessageRequest {
  int64  account_id = 1; // 目标账户 ID
  string title      = 2;
  string body       = 3;
}

// ─── Email 相关消息 ────────────────────────────────────────────────────────────

// 调试邮件请求
message DebugEmailRequest {
  string to      = 1; // 收件人邮箱
  string subject = 2; // 邮件主题
  string body    = 3; // 邮件正文（HTML）
}

// 向用户发送邮件请求
message SendToUserRequest {
  int64  party_id = 1; // 目标用户 party_id
  string subject  = 2;
  string body     = 3; // HTML 正文
}

// 创建批量邮件任务请求
message CreateBatchRequest {
  int32  topic_content_id = 1; // 使用的 TopicContent ID（确定邮件语言和内容）
  string target_criteria  = 2; // JSON 字符串，描述目标受众筛选条件
}

// 确认发送批量邮件请求
message ConfirmBatchRequest {
  int64 batch_id = 1; // 待发送的 EmailBatch ID
}

// 退订检查请求
message CheckSuppressionRequest {
  string email = 1;
}

// 邮件模板列表查询（EmailTemplate 类型的 Topic）
message ListEmailTemplatesRequest {
  PaginationRequest pagination = 1;
  optional string   keywords   = 2; // 按标题关键字搜索
}

// 批量邮件收件人邮箱分页请求
message GetBatchReceiverEmailsRequest {
  string spec = 1; // JSON 格式的 CreateSendTopicContentSpec
  int32  page = 2; // 页码（每页 100 条）
}

// ─── Topic 相关消息 ────────────────────────────────────────────────────────────

// Topic 列表查询
message ListTopicsRequest {
  PaginationRequest pagination = 1;
  optional int32    type       = 2; // 按类型过滤
  optional int32    status     = 3; // 按状态过滤（0=active、1=inactive、2=trash）
  optional string   keywords   = 4; // 按标题关键字搜索
}

message ListTopicsResponse {
  repeated Topic data = 1;
  PaginationMeta criteria = 2;
}

// 按 id（含可选语言）查询 Topic
message GetTopicRequest {
  int32           id       = 1;
  optional string language = 2; // 若指定，只返回该语言的 content；不指定返回所有
}

// 创建 Topic 请求
message CreateTopicRequest {
  string title = 1;
  int32  type  = 2; // Topic 类型枚举
}

// 更新 Topic 请求
message UpdateTopicRequest {
  int32            id   = 1;
  CreateTopicRequest spec = 2;
}

// 创建 Topic 多语言内容请求
message CreateTopicContentRequest {
  int32  id       = 1; // Topic ID
  string language = 2; // 语言代码，如 "en"
  string content  = 3; // 内容正文（HTML）
}

// 多语言内容规格（用于创建和更新）
message TopicContentSpec {
  string language = 1;
  string content  = 2;
}

// 更新 Topic 多语言内容请求
message UpdateTopicContentRequest {
  int32            id         = 1; // Topic ID
  int32            content_id = 2; // TopicContent ID
  TopicContentSpec spec       = 3;
}

// 删除 Topic 多语言内容请求
message DeleteTopicContentRequest {
  int32 id         = 1; // Topic ID
  int32 content_id = 2; // TopicContent ID
}
