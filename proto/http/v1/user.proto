  int64 medium_id = 2; // 文件 medium ID
}

message DeleteDocumentResponse {
  bool   success = 1;
  string message = 2;
}

// SetAwaitingAddressVerify 请求/响应
message SetAwaitingAddressVerifyRequest {
  int64 id = 1;
}

message SetAwaitingAddressVerifyResponse {
  Verification data = 1;
}

// SetAwaitingCodeVerify 请求/响应
message SetAwaitingCodeVerifyRequest {
  int64 id = 1;
}

message SetAwaitingCodeVerifyResponse {
  Verification data = 1;
}

// GetMailCode 请求/响应
message GetMailCodeRequest {
  int64 id = 1;
}

message GetMailCodeResponse {
  string code       = 1; // 验证码
  string expires_at = 2; // 过期时间，ISO 8601 格式
}

// SendMailCode 请求/响应
message SendMailCodeRequest {
  int64 id = 1;
}

message SendMailCodeResponse {
  bool   success = 1;
  string message = 2;
}

// ─── Client Verification 相关消息 ────────────────────────────────────────────

// GetVerificationStatus 请求/响应（客户端）
message GetVerificationStatusRequest {}

message GetVerificationStatusResponse {
  int32  status     = 1; // 当前验证状态枚举值
  string updated_at = 2; // 最后更新时间，ISO 8601 格式
}

// CreateNewVerification 请求/响应
message CreateNewVerificationRequest {}

message CreateNewVerificationResponse {
  Verification data = 1;
}

// GetExistingVerification 请求/响应
message GetExistingVerificationRequest {}

message GetExistingVerificationResponse {
  Verification data = 1;
}

// 标记开始填写请求/响应
message MarkStartedRequest {
  string step = 1; // 步骤标识，如 "personal_info"、"financial_info"
}

message MarkStartedResponse {
  bool   success = 1;
  string message = 2;
}

// 提交个人信息请求/响应
message SubmitPersonalInfoRequest {
  string data = 1; // JSON 格式的表单数据
}

message SubmitPersonalInfoResponse {
  Verification data = 1;
}

// 提交财务信息请求/响应
message SubmitFinancialInfoRequest {
  string data = 1;
}

message SubmitFinancialInfoResponse {
  Verification data = 1;
}

// 提交协议确认请求/响应
message SubmitAgreementRequest {
  string data = 1;
}

message SubmitAgreementResponse {
  Verification data = 1;
}

// 提交问卷答案请求/响应
message SubmitQuizRequest {
  repeated QuizAnswer answers = 1;
}

message SubmitQuizResponse {
  Verification data = 1;
}

// 单题答案
message QuizAnswer {
  int32  question_id = 1; // 题目 ID
  string answer      = 2; // 答案字符串（选项 key 或文本）
}

// GetQuiz 请求/响应
message GetQuizRequest {}

message GetQuizResponse {
  repeated QuizQuestion questions = 1;
}

// 单道问卷题目
message QuizQuestion {
  int32           id       = 1; // 题目 ID
  string          question = 2; // 题目文本
  repeated string options  = 3; // 选项列表
}

// SubmitVerification 请求/响应
message SubmitVerificationRequest {}

message SubmitVerificationResponse {
  Verification data = 1;
}

// 提交邮件验证码请求/响应
message SubmitVerifyCodeRequest {
  string code = 1; // 用户收到的验证码
}

message SubmitVerifyCodeResponse {
  bool   success = 1;
  string message = 2;
}

// ─── Auth V2 相关消息 ─────────────────────────────────────────────────────────

// GetDomainInfo 请求/响应
message GetDomainInfoRequest {}

message GetDomainInfoResponse {
  string domain    = 1; // 当前请求域名
  string tenant_id = 2; // 对应 tenant ID（字符串形式）
}

// GetWelcomeInfo 请求/响应
message GetWelcomeInfoRequest {}

message GetWelcomeInfoResponse {
  string title   = 1; // 欢迎标题
  string message = 2; // 欢迎文案
}

// GetIpInfo 请求/响应
message GetIpInfoRequest {}

message GetIpInfoResponse {
  string ip      = 1; // 客户端 IP 地址
  string country = 2; // IP 对应国家代码，如 "AU"
}

// 站点配置查询请求/响应
message GetSiteConfigRequest {
  optional string open_at = 1; // 可选时间戳（ISO 8601），获取该时刻的配置快照
}

message GetSiteConfigResponse {
  string config = 1; // JSON 字符串，包含前端所需的全量配置
}

// 注册请求/响应
message RegisterRequest {
  string email      = 1; // 注册邮箱
  string password   = 2; // 密码（明文，传输层 HTTPS 加密）
  string ref_code   = 3; // 推荐码（可选）
  string first_name = 4; // 名
  string last_name  = 5; // 姓
}

message RegisterResponse {
  int64  party_id = 1; // 新用户 party_id
  string email    = 2; // 注册邮箱
}

// Logout 请求/响应
message LogoutRequest {}

message LogoutResponse {
  bool   success = 1;
  string message = 2;
}

// 忘记密码请求/响应
message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  bool   success = 1;
  string message = 2;
}

// 修改密码请求/响应（需旧密码验证）
message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {
  bool   success = 1;
  string message = 2;
}

// 重置密码请求/响应（通过邮件链接）
message ResetPasswordRequest {
  string token        = 1; // 邮件中的重置 token
  string new_password = 2;
}

message ResetPasswordResponse {
  bool   success = 1;
  string message = 2;
}

// GetLoginAuthCode 请求/响应
message GetLoginAuthCodeRequest {}

message GetLoginAuthCodeResponse {
  string code       = 1; // 验证码
  string expires_at = 2; // 过期时间，ISO 8601 格式
}

// ConfirmLoginAuthCode 请求/响应
message ConfirmLoginAuthCodeRequest {
  string code = 1;
}

message ConfirmLoginAuthCodeResponse {
  bool   success = 1;
  string message = 2;
}

// 发送密码重置验证码请求/响应
message GetPasswordResetCodeRequest {
  string email = 1; // 发送验证码的目标邮箱
}

message GetPasswordResetCodeResponse {
  bool   success = 1;
  string message = 2;
}

// 确认密码重置验证码请求/响应
message ConfirmPasswordResetCodeRequest {
  string email = 1;
  string code  = 2; // 用户收到的验证码
}

message ConfirmPasswordResetCodeResponse {
  bool   success = 1;
  string message = 2;
}

// ─── User V2 相关消息 ─────────────────────────────────────────────────────────

// Ping 请求/响应
message PingRequest {}

message PingResponse {
  string status = 1; // 服务状态，如 "ok"
}

// GetMe 请求/响应
message GetMeRequest {}

message GetMeResponse {
  User data = 1;
}
