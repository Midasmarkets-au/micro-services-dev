syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";
option go_package = "proto/http/v1;httpv1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant User API (api/v1/tenant/user) ────────────────────────────────────
// 后台用户管理接口：查询、标签/角色/权限管理、KYC 关联操作、
// 账户绑定、锁定/解锁、迁移及社交媒体信息等全量管理功能。

service TenantUserService {
  // HTTP 路由由 MVC UserController.Index 处理，支持完整 Party.Criteria 过滤
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {}
  // 按 party_id 获取用户完整信息
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}" };
  }
  // 按 party_id 获取用户（别名接口，路径前缀为 /pid/）
  rpc GetUserByPid(GetUserByPidRequest) returns (GetUserByPidResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/pid/{party_id}" };
  }
  // 获取用户摘要列表（字段精简版，用于下拉选择等场景）
  rpc GetUserSummary(GetUserSummaryRequest) returns (GetUserSummaryResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/summary" };
  }
  // 按 uid 获取用户（uid 为账户维度的用户标识）
  rpc GetUserByUid(GetUserByUidRequest) returns (GetUserByUidResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/uid/{uid}" };
  }
  // 按主键 id 获取用户
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/id/{id}" };
  }
  // 为用户添加自定义标签（tag 为路径参数）
  rpc AddUserTag(AddUserTagRequest) returns (AddUserTagResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/tag/{tag}" };
  }
  // 移除用户标签
  rpc RemoveUserTag(RemoveUserTagRequest) returns (RemoveUserTagResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/tag/{tag}" };
  }
  // 获取 tenant 下所有可用角色列表；HTTP 路由由 MVC UserController.GetAllRoles 处理，返回原始数组格式
  rpc GetAllRoles(GetAllRolesRequest) returns (GetAllRolesResponse) {}
  // 按 role_id 为用户添加角色
  rpc AddRole(AddRoleRequest) returns (AddRoleResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/role/{role_id}/add" };
  }
  // 按 role_id 移除用户角色
  rpc RemoveRole(RemoveRoleRequest) returns (RemoveRoleResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/role/{role_id}/remove" };
  }
  // 获取用户的所有权限列表
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/permission" };
  }
  // 获取用户的所有 Claims（key-value map）
  rpc GetUserClaims(GetUserClaimsRequest) returns (GetUserClaimsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/claim" };
  }
  // 按角色名称为用户添加角色
  rpc AddRoleByName(AddRoleByNameRequest) returns (AddRoleByNameResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/role/{role}" };
  }
  // 按角色名称移除用户角色
  rpc RemoveRoleByName(RemoveRoleByNameRequest) returns (RemoveRoleByNameResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/role/{role}" };
  }
  // 为用户添加单项权限（permission 为权限字符串，如 "deposit.create"）
  rpc AddPermission(AddPermissionRequest) returns (AddPermissionResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/permission/{permission}" };
  }
  // 移除用户单项权限
  rpc RemovePermission(RemovePermissionRequest) returns (RemovePermissionResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/permission/{permission}" };
  }
  // 禁用批发申请权限（固定 permission="application-wholesale-disabled"）
  rpc DisableWholesalePermission(DisableWholesalePermissionRequest) returns (DisableWholesalePermissionResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/permission/application-wholesale-disabled" };
  }
  // 绑定 Sales 账户到用户（party_id + account_uid 双向关联）
  rpc AddSalesAccount(AddSalesAccountRequest) returns (AddSalesAccountResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/sales-account/{account_uid}" };
  }
  // 解绑 Sales 账户
  rpc RemoveSalesAccount(RemoveSalesAccountRequest) returns (RemoveSalesAccountResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/sales-account/{account_uid}" };
  }
  // 绑定 Agent（IB）账户到用户
  rpc AddAgentAccount(AddAgentAccountRequest) returns (AddAgentAccountResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/agent-account/{account_uid}" };
  }
  // 解绑 Agent 账户
  rpc RemoveAgentAccount(RemoveAgentAccountRequest) returns (RemoveAgentAccountResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user/{party_id}/agent-account/{account_uid}" };
  }
  // 分页查询用户的操作审计记录（如登录、修改资料等）
  rpc ListUserAudits(ListUserAuditsRequest) returns (ListUserAuditsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/audit" };
  }
  // 按 id 获取单条用户审计记录
  rpc GetUserAudit(GetUserAuditRequest) returns (GetUserAuditResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/audit/{id}" };
  }
  // 获取用户的支付服务设置（JSON 格式，含支付方式限额等）
  rpc GetUserPaymentService(GetUserPaymentServiceRequest) returns (GetUserPaymentServiceResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/payment-service" };
  }
  // 更新用户的支付服务设置（spec 为 JSON 字符串）
  rpc UpdateUserPaymentService(UpdateUserPaymentServiceRequest) returns (UpdateUserPaymentServiceResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/payment-service", body: "*" };
  }
  // 更新用户基本资料（spec 为 JSON 字符串，对应 User.TenantUpdateSpec）
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/profile", body: "*" };
  }
  // 更新用户状态（status 枚举值）
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (UpdateUserStatusResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/status", body: "*" };
  }
  // 将用户迁移至指定站点（site_id 为路径参数）
  rpc UpdateUserSite(UpdateUserSiteRequest) returns (UpdateUserSiteResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/site/{site_id}" };
  }
  // 锁定用户账户（禁止登录）
  rpc LockUser(LockUserRequest) returns (LockUserResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/lock" };
  }
  // 解锁用户账户
  rpc UnlockUser(UnlockUserRequest) returns (UnlockUserResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/unlock" };
  }
  // 通过答题方式解锁用户（用于异常解锁流程）
  rpc UnlockByQuiz(UnlockByQuizRequest) returns (UnlockByQuizResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user/{party_id}/unlock/quiz" };
  }
  // 为用户启用上帝模式（绕过部分业务校验，仅限特定管理员）
  rpc EnableGodMode(EnableGodModeRequest) returns (EnableGodModeResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/god-mode" };
  }
  // 分页查询用户地址列表（可按 party_id 过滤）
  rpc ListUserAddresses(ListUserAddressesRequest) returns (ListUserAddressesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/address" };
  }
  // 按 address_id 获取地址详情
  rpc GetUserAddress(GetUserAddressRequest) returns (GetUserAddressResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/address/{address_id}" };
  }
  // 将用户迁移至另一 tenant（数据整体迁移，不可逆）
  rpc MigrateUser(MigrateUserRequest) returns (MigrateUserResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/migrate-to/{tenant_id}" };
  }
  // 将用户复制到另一 tenant（spec 为 JSON 格式的用户覆盖数据）
  rpc DuplicateUser(DuplicateUserRequest) returns (DuplicateUserResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user/{party_id}/duplicate-to/{tenant_id}", body: "*" };
  }
  // 获取旧版个人信息（兼容历史数据，返回 JSON）
  rpc GetLegacyPersonalInfo(GetLegacyPersonalInfoRequest) returns (GetLegacyPersonalInfoResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/legacy/personal-info" };
  }
  // 获取旧版财务信息（兼容历史数据，返回 JSON）
  rpc GetLegacyFinancialInfo(GetLegacyFinancialInfoRequest) returns (GetLegacyFinancialInfoResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/legacy/financial-info" };
  }
  // 获取旧版 KYC 表单（兼容历史数据，返回 JSON）
  rpc GetLegacyKycForm(GetLegacyKycFormRequest) returns (GetLegacyKycFormResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/legacy/kyc-form" };
  }
  // 获取旧版 KYC 修正记录（兼容历史数据，返回 JSON）
  rpc GetLegacyKycCorrection(GetLegacyKycCorrectionRequest) returns (GetLegacyKycCorrectionResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user/{party_id}/legacy/kyc-correction" };
  }
  // 获取用户社交媒体信息（HTTP 路由由 MVC UserController 处理，gRPC 仅内部调用）
  rpc GetSocialMediaInfo(GetSocialMediaInfoRequest) returns (GetSocialMediaInfoResponse) {}
  // 更新用户社交媒体信息（HTTP 路由由 MVC UserController 处理，gRPC 仅内部调用）
  rpc UpdateSocialMediaInfo(UpdateSocialMediaInfoRequest) returns (UpdateSocialMediaInfoResponse) {}
}

// ─── Tenant Role API (api/v1/tenant/role) ────────────────────────────────────
// 只读角色查询接口（角色定义通过 IdentityServer4 配置）。

service TenantRoleService {
  // 获取 tenant 下所有角色列表
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/role" };
  }
  // 按 id 获取角色详情
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/role/{id}" };
  }
}

// ─── Tenant Permission API (api/v1/tenant/permission) ────────────────────────
// 只读权限查询接口。

service TenantPermissionService {
  // 获取 tenant 下所有可用权限字符串列表
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/permission" };
  }
}

// ─── Tenant KYC API (api/v1/tenant/kyc) ─────────────────────────────────────
// KYC 表单的完整管理：创建、更新、签名、审核、拒绝。
// KYC 状态流转：draft → awaiting_review → signed → finalized / rejected

service TenantKycService {
  // 分页查询 KYC 列表；可按 status 过滤
  // HTTP 路由由 MVC KycController 处理，支持完整 Verification.Criteria（含 statuses 多值过滤）
  rpc ListKycs(ListKycsRequest) returns (ListKycsResponse) {}
  // 按 party_id 获取用户 KYC 表单（含 form_data JSON）
  rpc GetKyc(GetKycRequest) returns (GetKycResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/kyc/{party_id}" };
  }
  // 为用户创建新 KYC 表单（spec 为 JSON 格式的 KycFormViewModel）
  rpc CreateKyc(CreateKycRequest) returns (CreateKycResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/kyc/{party_id}", body: "*" };
  }
  // 更新 KYC 表单内容（spec 为 JSON 格式的 KycFormViewModel）
  rpc UpdateKyc(UpdateKycRequest) returns (UpdateKycResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/kyc/{party_id}", body: "*" };
  }
  // 将 KYC 状态设置为等待审核
  rpc AwaitingReview(AwaitingReviewRequest) returns (AwaitingReviewResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/kyc/{party_id}/awaiting-review" };
  }
  // 对 KYC 表单进行合规签名
  rpc SignKyc(SignKycRequest) returns (SignKycResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/kyc/{party_id}/sign", body: "*" };
  }
  // 最终确认 KYC（status → finalized，账户开户完成）
  rpc FinalizeKyc(FinalizeKycRequest) returns (FinalizeKycResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/kyc/{party_id}/finalize", body: "*" };
  }
  // 获取 KYC 历史状态变更记录
  rpc GetKycHistory(GetKycHistoryRequest) returns (GetKycHistoryResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/kyc/{party_id}/history" };
  }
  // 拒绝 KYC 申请（status → rejected）
  rpc RejectKyc(RejectKycRequest) returns (RejectKycResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/kyc/{party_id}/reject" };
  }
  // 获取合规人员电子签名
  rpc GetComplianceSig(GetComplianceSigRequest) returns (GetComplianceSigResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/kyc/complianceSig" };
  }
}

// ─── Tenant Verification API (api/v1/tenant/verification) ────────────────────
// 用户身份验证（文件上传审核）的完整管理：
// 状态流转：under_review → awaiting_approve / awaiting_review → approved / rejected
// 支持单独审批/拒绝文件，以及邮件验证码发送。

service TenantVerificationService {
  // HTTP 路由由 MVC VerificationController 处理，返回完整 VerificationDTO 格式（含 user/items/comments）
  rpc ListVerifications(ListVerificationsRequest) returns (ListVerificationsResponse) {}
  // HTTP 路由由 MVC VerificationController 处理
  rpc GetVerification(GetVerificationRequest) returns (GetVerificationResponse) {}
  // 获取验证申请中的特定 item（文件/证件条目）
  rpc GetVerificationItem(GetVerificationItemRequest) returns (GetVerificationItemResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/verification/{id}/item/{item_id}" };
  }
  // 获取验证申请的所有 item 列表
  rpc GetVerificationItemList(GetVerificationItemListRequest) returns (GetVerificationItemListResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/verification/{id}/item-list" };
  }
  // 将验证申请设为审核中（status → under_review）
  rpc SetUnderReview(SetUnderReviewRequest) returns (SetUnderReviewResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/under-review" };
  }
  // 将验证申请设为等待批准（status → awaiting_approve）
  rpc SetAwaitingApprove(SetAwaitingApproveRequest) returns (SetAwaitingApproveResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/awaiting-approve" };
  }
  // 批准验证申请（status → approved，触发账户激活流程）
  rpc ApproveVerification(ApproveVerificationRequest) returns (ApproveVerificationResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/approve" };
  }
  // 延迟批准（status → delayed_approve，标记待后续处理）
  rpc DelayedApprove(DelayedApproveRequest) returns (DelayedApproveResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/delayed-approve" };
  }
  // 将验证申请重新设为等待审核
  rpc SetAwaitingReview(SetAwaitingReviewRequest) returns (SetAwaitingReviewResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/awaiting-review" };
  }
  // 拒绝验证申请（status → rejected）
  rpc RejectVerification(RejectVerificationRequest) returns (RejectVerificationResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/reject" };
  }
  // 发送文件拒绝通知邮件（通知用户重新上传文件）
  rpc RejectDocumentNotice(RejectDocumentNoticeRequest) returns (RejectDocumentNoticeResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/document/reject-notice" };
  }
  // 拒绝特定文件（medium_id 为文件 ID，spec 含拒绝原因）
  rpc RejectDocument(RejectDocumentRequest) returns (RejectDocumentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/document/{medium_id}/reject", body: "*" };
  }
  // 批准特定文件
  rpc ApproveDocument(ApproveDocumentRequest) returns (ApproveDocumentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/document/{medium_id}/approve" };
  }
  // 删除特定文件（不可恢复）
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/verification/{id}/document/{medium_id}" };
  }
  // 将验证申请设为等待地址验证
  rpc SetAwaitingAddressVerify(SetAwaitingAddressVerifyRequest) returns (SetAwaitingAddressVerifyResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/awaiting-address-verify" };
  }
  // 将验证申请设为等待验证码验证
  rpc SetAwaitingCodeVerify(SetAwaitingCodeVerifyRequest) returns (SetAwaitingCodeVerifyResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/verification/{id}/awaiting-code-verify" };
  }
  // 获取当前验证申请对应的邮件验证码（后台查看用）
  rpc GetMailCode(GetMailCodeRequest) returns (GetMailCodeResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/verification/{id}/mail-code" };
  }
  // 触发向用户发送邮件验证码
  rpc SendMailCode(SendMailCodeRequest) returns (SendMailCodeResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/verification/{id}/mail-code" };
  }
}

// ─── Client Verification API (api/v1/client/verification) ────────────────────
// 客户端用户提交 KYC 验证的完整流程：
// 查状态 → 创建申请 → 填写各步骤信息 → 提交审核

service ClientVerificationService {
  // 获取当前登录用户的验证状态和最后更新时间
  rpc GetVerificationStatus(GetVerificationStatusRequest) returns (GetVerificationStatusResponse) {
    option (google.api.http) = { get: "/api/v1/client/verification" };
  }
  // 创建新的验证申请（若已有未完成申请会报错）
  rpc CreateNewVerification(CreateNewVerificationRequest) returns (CreateNewVerificationResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/new" };
  }
  // 获取当前已有的验证申请（若存在）
  rpc GetExistingVerification(GetExistingVerificationRequest) returns (GetExistingVerificationResponse) {
    option (google.api.http) = { get: "/api/v1/client/verification/existing" };
  }
  // 标记已开始填写某步骤（step 为步骤标识字符串）
  rpc MarkStarted(MarkStartedRequest) returns (MarkStartedResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/started", body: "*" };
  }
  // 提交个人信息（data 为 JSON 格式的表单数据）
  rpc SubmitPersonalInfo(SubmitPersonalInfoRequest) returns (SubmitPersonalInfoResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/info", body: "*" };
  }
  // 提交财务信息（data 为 JSON 格式的表单数据）
  rpc SubmitFinancialInfo(SubmitFinancialInfoRequest) returns (SubmitFinancialInfoResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/financial", body: "*" };
  }
  // 提交协议确认（data 为 JSON，包含同意的条款版本等）
  rpc SubmitAgreement(SubmitAgreementRequest) returns (SubmitAgreementResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/agreement", body: "*" };
  }
  // 提交投资者适当性问卷答案
  rpc SubmitQuiz(SubmitQuizRequest) returns (SubmitQuizResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/quiz", body: "*" };
  }
  // 获取投资者适当性问卷题目列表
  rpc GetQuiz(GetQuizRequest) returns (GetQuizResponse) {
    option (google.api.http) = { get: "/api/v1/client/verification/quiz" };
  }
  // 提交验证申请（所有步骤填写完毕后调用，进入后台审核队列）
  rpc SubmitVerification(SubmitVerificationRequest) returns (SubmitVerificationResponse) {
    option (google.api.http) = { put: "/api/v1/client/verification/submit" };
  }
  // 提交邮件验证码（用于验证用户邮箱所有权）
  rpc SubmitVerifyCode(SubmitVerifyCodeRequest) returns (SubmitVerifyCodeResponse) {
    option (google.api.http) = { post: "/api/v1/client/verification/verify-code", body: "*" };
  }
}

// ─── Auth V2 API (api/v2/auth) ───────────────────────────────────────────────
// 认证相关接口：注册、登出、密码管理、验证码确认及站点配置获取。

service AuthV2Service {
  // 按当前请求域名获取 tenant 及域名配置信息
  rpc GetDomainInfo(GetDomainInfoRequest) returns (GetDomainInfoResponse) {
    option (google.api.http) = { get: "/api/v2/domain" };
  }
  // 获取站点欢迎页信息（标题和欢迎文案）
  rpc GetWelcomeInfo(GetWelcomeInfoRequest) returns (GetWelcomeInfoResponse) {
    option (google.api.http) = { get: "/api/v2/welcome" };
  }
  // 获取当前请求的 IP 地址及地理位置国家
  rpc GetIpInfo(GetIpInfoRequest) returns (GetIpInfoResponse) {
    option (google.api.http) = { get: "/api/v2/auth/ip-info" };
  }
  // 获取站点前端配置（open_at 为可选时间戳，返回对应时间点的配置 JSON）
  rpc GetSiteConfig(GetSiteConfigRequest) returns (GetSiteConfigResponse) {
    option (google.api.http) = { get: "/api/v2/auth/c" };
  }
  // 用户注册（含邮箱、密码、推荐码、姓名等信息）
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = { post: "/api/v2/auth/register", body: "*" };
  }
  // 登出（使当前 Token 失效）
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = { post: "/api/v2/auth/logout" };
  }
  // 发送忘记密码邮件（含重置链接）
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse) {
    option (google.api.http) = { post: "/api/v2/auth/password/forgot", body: "*" };
  }
  // 修改密码（需提供旧密码验证）
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (google.api.http) = { post: "/api/v2/auth/password/change", body: "*" };
  }
  // 通过重置 token 重置密码（配合 ForgotPassword 邮件链接使用）
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse) {
    option (google.api.http) = { post: "/api/v2/auth/password/reset", body: "*" };
  }
  // 获取登录二次验证码（二次认证流程）
  rpc GetLoginAuthCode(GetLoginAuthCodeRequest) returns (GetLoginAuthCodeResponse) {
    option (google.api.http) = { post: "/api/v2/auth/token/code" };
  }
  // 确认登录验证码（验证后完成登录）
  rpc ConfirmLoginAuthCode(ConfirmLoginAuthCodeRequest) returns (ConfirmLoginAuthCodeResponse) {
    option (google.api.http) = { post: "/api/v2/auth/token/code/confirm", body: "*" };
  }
  // 发送密码重置验证码（发送至指定邮箱）
  rpc GetPasswordResetCode(GetPasswordResetCodeRequest) returns (GetPasswordResetCodeResponse) {
    option (google.api.http) = { post: "/api/v2/auth/password-reset/code", body: "*" };
  }
  // 确认密码重置验证码（验证通过后允许重置密码）
  rpc ConfirmPasswordResetCode(ConfirmPasswordResetCodeRequest) returns (ConfirmPasswordResetCodeResponse) {
    option (google.api.http) = { post: "/api/v2/auth/password-reset/code/confirm", body: "*" };
  }
}

// ─── User V2 API (api/v2/user) ───────────────────────────────────────────────
// 登录用户的自助服务接口：查看自身信息、管理地址。

service UserV2Service {
  // 健康检查，返回服务状态字符串
  rpc Ping(PingRequest) returns (PingResponse) {
    option (google.api.http) = { get: "/api/v2/user/ping" };
  }
  // 获取当前登录用户的完整信息
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = { get: "/api/v2/user/me" };
  }
  // 分页查询当前用户的地址列表
  rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse) {
    option (google.api.http) = { get: "/api/v2/user/address" };
  }
  // 按 hash_id 获取地址详情
  rpc GetAddress(GetAddressRequest) returns (GetAddressResponse) {
    option (google.api.http) = { get: "/api/v2/user/address/{hash_id}" };
  }
  // 创建新地址
  rpc CreateAddress(CreateAddressRequest) returns (CreateAddressResponse) {
    option (google.api.http) = { post: "/api/v2/user/address", body: "*" };
  }
  // 更新地址（body 字段名为 spec）
  rpc UpdateAddress(UpdateAddressRequest) returns (UpdateAddressResponse) {
    option (google.api.http) = { put: "/api/v2/user/address/{hash_id}", body: "spec" };
  }
}

// ─── Messages ────────────────────────────────────────────────────────────────

// 用户实体
message User {
  int64  id           = 1; // 用户主键 ID
  int64  party_id     = 2; // 用户 party_id（跨 tenant 唯一标识）
  string email        = 3; // 登录邮箱
  string first_name   = 4; // 名
  string last_name    = 5; // 姓
  int32  status       = 6; // 用户状态：0=inactive、1=active、2=locked、3=suspended
  string created_at   = 7; // 注册时间，ISO 8601 格式
  optional string lockout_end = 8; // 锁定截止时间（ISO 8601），为空表示未锁定
  optional string token       = 9; // god mode 临时访问 token（仅 EnableGodMode 接口返回）
}

// 角色实体
message Role {
  int64  id   = 1; // 角色 ID
  string name = 2; // 角色名称，如 "admin"、"compliance"
}

// 地址实体
// city / is_default 字段已移除：Address 实体无此列，数据存储于 Name/Content 字段
message Address {
  int64  id       = 1; // 地址 ID
  string hash_id  = 2; // 地址哈希 ID（URL 友好，对外暴露）
  int64  party_id = 3; // 所属用户 party_id
  string country  = 4; // 国家代码，如 "AU"、"CN"
  string address  = 5; // 详细地址（对应 Name 字段）
}

// KYC 表单实体
message KycForm {
  int64  id        = 1; // KYC 记录 ID
  int64  party_id  = 2; // 关联用户 party_id
  int32  status    = 3; // KYC 状态：0=draft、1=awaiting_review、2=signed、3=finalized、4=rejected
  string form_data = 4; // KYC 表单完整数据（JSON 字符串，含个人/财务/协议信息）
}

// 身份验证申请实体
message Verification {
  int64  id         = 1; // 验证申请 ID
  int64  party_id   = 2; // 关联用户 party_id
  int32  status     = 3; // 验证状态：0=draft、1=under_review、2=awaiting_approve、3=approved、4=rejected 等
  string created_at = 4; // 申请创建时间，ISO 8601 格式
}

// 验证申请中的文件/证件条目实体
message VerificationItem {
  int64  id              = 1; // 条目 ID
  int64  verification_id = 2; // 关联验证申请 ID
  string category        = 3; // 条目分类，对应 VerificationCategoryTypes（如 "document"、"info"、"financial"）
  string content         = 4; // 条目内容 JSON（文件路径、表单数据等）
}

