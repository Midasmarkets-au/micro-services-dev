syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";
option go_package = "proto/http/v1;httpv1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Audit API (api/v1/tenant/audit) ──────────────────────────────────
// 查询后台操作审计记录，包括账户余额变动和高额交易监控。
// 审计记录由系统自动写入，仅支持只读查询。

// HTTP 路由全部由 MVC AuditController 处理，返回含 user/account 的完整格式
service TenantAuditService {
  rpc ListAudits(ListAuditsRequest) returns (ListAuditsResponse) {}
  rpc GetAudit(GetAuditRequest) returns (GetAuditResponse) {}
  rpc ListAccountChangeBalanceAudits(ListAccountChangeBalanceAuditsRequest) returns (ListAccountChangeBalanceAuditsResponse) {}
  rpc GetHighDollarLatest(GetHighDollarLatestRequest) returns (GetHighDollarLatestResponse) {}
}

// ─── Tenant IP Blacklist API (api/v1/tenant/ip-black-list) ───────────────────
// 管理 IP 黑名单，被加入黑名单的 IP 地址将被系统拒绝访问。
// 修改后需调用 ReloadCache 使变更立即生效。

service TenantIpBlacklistService {
  // 分页查询 IP 黑名单；可按 IP 地址前缀或 status 过滤
  rpc ListIpBlacklist(ListIpBlacklistRequest) returns (ListIpBlacklistResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/ip-black-list" };
  }
  // 新增 IP 黑名单条目
  rpc CreateIpBlacklist(CreateIpBlacklistRequest) returns (CreateIpBlacklistResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/ip-black-list", body: "*" };
  }
  // 更新 IP 黑名单条目（body 字段名为 spec）
  rpc UpdateIpBlacklist(UpdateIpBlacklistRequest) returns (UpdateIpBlacklistResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/ip-black-list/{id}", body: "spec" };
  }
  // 删除 IP 黑名单条目
  rpc DeleteIpBlacklist(DeleteIpBlacklistRequest) returns (DeleteIpBlacklistResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/ip-black-list/{id}" };
  }
  // 重载 IP 黑名单缓存（增删改后需调用此接口使变更立即生效）
  rpc ReloadCache(ReloadCacheRequest) returns (ReloadCacheResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/ip-black-list/reload-cache" };
  }
}

// ─── Tenant User Blacklist API (api/v1/tenant/user-black-list) ───────────────
// 管理用户邮箱黑名单，被加入黑名单的邮箱无法注册或登录。

service TenantUserBlacklistService {
  // 分页查询用户黑名单；可按邮箱或 status 过滤
  rpc ListUserBlacklist(ListUserBlacklistRequest) returns (ListUserBlacklistResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/user-black-list" };
  }
  // 新增用户邮箱黑名单条目
  rpc CreateUserBlacklist(CreateUserBlacklistRequest) returns (CreateUserBlacklistResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/user-black-list", body: "*" };
  }
  // 更新用户黑名单条目（body 字段名为 spec）
  rpc UpdateUserBlacklist(UpdateUserBlacklistRequest) returns (UpdateUserBlacklistResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user-black-list/{id}", body: "spec" };
  }
  // 删除用户黑名单条目
  rpc DeleteUserBlacklist(DeleteUserBlacklistRequest) returns (DeleteUserBlacklistResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/user-black-list/{id}" };
  }
  // 重新加载用户黑名单缓存（将数据库数据同步到 Redis）
  rpc ReloadUserBlacklistCache(ReloadUserBlacklistCacheRequest) returns (ReloadUserBlacklistCacheResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/user-black-list/reload-cache" };
  }
}

// ─── Tenant API Log API (api/v1/tenant/api-log) ──────────────────────────────
// 查询 HTTP API 访问日志，用于调试和安全审查。

service TenantApiLogService {
  // 分页查询 API 日志；HTTP 路由由 MVC ApiLogController 处理，返回含 user/requestContent/responseContent 的完整格式
  rpc ListApiLogs(ListApiLogsRequest) returns (ListApiLogsResponse) {}
}

// ─── Tenant Statistics API (api/v2/tenant/statistic) ────────────────────────
// 实时在线用户统计，包括管理员和客户端在线人数。

// HTTP 路由由 MVC StatisticControllerV2 处理
service TenantStatisticsService {
  rpc GetOnlineAdmins(GetOnlineAdminsRequest) returns (GetOnlineAdminsResponse) {}
  rpc GetOnlineUsers(GetOnlineUsersRequest) returns (GetOnlineUsersResponse) {}
}

// HTTP 路由由 MVC StatisticControllerV2 处理
service TenantStatisticsV2Service {
  rpc GetServers(GetServersRequest) returns (GetServersResponse) {}
  rpc GetServerMetrics(GetServerMetricsRequest) returns (GetServerMetricsResponse) {}
}

// ─── Messages ────────────────────────────────────────────────────────────────


// 审计记录实体
message Audit {
  int64  id         = 1; // 审计记录 ID
  int64  account_id = 2; // 触发操作的账户 ID（0 表示系统操作）
  string action     = 3; // 操作类型标识，如 "account-change-balance"
  string detail     = 4; // 操作详情（JSON 字符串或可读文本）
  string ip         = 5; // 操作者 IP 地址
  string created_at = 6; // 操作时间，ISO 8601 格式
}

// IP 黑名单条目实体
message IpBlacklistItem {
  int64  id            = 1; // 黑名单记录 ID
  string ip            = 2; // IP 地址或 CIDR 段，如 "1.2.3.4" 或 "1.2.3.0/24"
  string note          = 3; // 加入黑名单的原因
  bool   enabled       = 4; // 是否启用
  string created_on    = 5; // 创建时间，ISO 8601 格式
  string operator_name = 6; // 操作人姓名
}

// 用户邮箱黑名单条目实体
message UserBlacklistItem {
  int64  id         = 1; // 黑名单记录 ID
  string email      = 2; // 被封禁的邮箱地址
  string reason     = 3; // 加入黑名单的原因
  int32  status     = 4; // 状态：1=active（生效中）、0=inactive（已禁用）
  string created_at = 5; // 创建时间，ISO 8601 格式
}

// API 访问日志实体
message ApiLog {
  int64  id          = 1; // 日志 ID
  string method      = 2; // HTTP 方法，如 "GET"、"POST"
  string path        = 3; // 请求路径，如 "/api/v1/tenant/deposit"
  int32  status_code = 4; // HTTP 响应状态码，如 200、401、500
  int64  duration    = 5; // 请求耗时（毫秒）
  string created_at  = 6; // 请求时间，ISO 8601 格式
}

// ─── Audit 相关消息 ────────────────────────────────────────────────────────────

// 审计记录列表查询
message ListAuditsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_id  = 2; // 按账户 ID 过滤
  optional string   action      = 3; // 按 action 关键字过滤，如 "account-change-balance"
  optional string   date_from   = 4; // ISO 8601 格式
  optional string   date_to     = 5; // ISO 8601 格式
}

message ListAuditsResponse {
  repeated Audit data = 1;
  PaginationMeta criteria = 2;
}

// 按 id 查询审计记录
message GetAuditRequest {
  int64 id = 1;
}

message GetAuditResponse {
  Audit data = 1;
}

// 账户余额变动审计列表（字段与 ListAuditsRequest / ListAuditsResponse 一致，独立类型以满足 RPC 唯一性）
message ListAccountChangeBalanceAuditsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_id  = 2;
  optional string   action      = 3;
  optional string   date_from   = 4;
  optional string   date_to     = 5;
}

message ListAccountChangeBalanceAuditsResponse {
  repeated Audit data = 1;
  PaginationMeta criteria = 2;
}

message GetHighDollarLatestRequest {}

message GetHighDollarLatestResponse {
  repeated Audit data = 1;
  PaginationMeta criteria = 2;
}

// ─── IP Blacklist 相关消息 ────────────────────────────────────────────────────

// IP 黑名单列表查询
message ListIpBlacklistRequest {
  PaginationRequest pagination = 1;
  optional string   ip        = 2; // 按 IP 地址前缀过滤
  optional int32    status    = 3; // 按状态过滤：1=active、0=inactive
  optional int32    page      = 4; // 兼容前端直接传 page
  optional int32    size      = 5; // 兼容前端直接传 size
}

message ListIpBlacklistResponse {
  repeated IpBlacklistItem data = 1;
  PaginationMeta           criteria = 2;
}

// 按 id 查询 IP 黑名单
message GetIpBlacklistRequest {
  int64 id = 1;
}

// 创建 IP 黑名单请求
message CreateIpBlacklistRequest {
  string ip   = 1; // IP 地址或 CIDR 段
  string note = 2; // 加入原因
}

// 更新 IP 黑名单请求
message UpdateIpBlacklistRequest {
  int64                    id      = 1;
  CreateIpBlacklistRequest spec    = 2;
  optional bool            enabled = 3; // 是否启用，不传则保持原值
}

message CreateIpBlacklistResponse {
  IpBlacklistItem data = 1;
}

message UpdateIpBlacklistResponse {
  IpBlacklistItem data = 1;
}

message DeleteIpBlacklistRequest {
  int64 id = 1;
}

message DeleteIpBlacklistResponse {
  bool   success = 1;
  string message = 2;
}

message ReloadCacheRequest {}

message ReloadCacheResponse {
  bool   success = 1;
  string message = 2;
}

// ─── User Blacklist 相关消息 ──────────────────────────────────────────────────

// 用户邮箱黑名单列表查询
message ListUserBlacklistRequest {
  PaginationRequest pagination = 1;
  optional string   email     = 2; // 按邮箱前缀过滤
  optional int32    status    = 3; // 按状态过滤：1=active、0=inactive
  optional int32    page      = 4; // 兼容前端直接传 page
  optional int32    size      = 5; // 兼容前端直接传 size
}

message ListUserBlacklistResponse {
  repeated UserBlacklistItem data = 1;
  PaginationMeta             criteria = 2;
}

// 按 id 查询用户黑名单
message GetUserBlacklistRequest {
  int64 id = 1;
}

// 创建用户黑名单请求
message CreateUserBlacklistRequest {
  string email  = 1;
  string reason = 2;
}

// 更新用户黑名单请求
message UpdateUserBlacklistRequest {
  int64                      id   = 1;
  CreateUserBlacklistRequest spec = 2;
}

message CreateUserBlacklistResponse {
  UserBlacklistItem data = 1;
}

message UpdateUserBlacklistResponse {
  UserBlacklistItem data = 1;
}

message DeleteUserBlacklistRequest {
  int64 id = 1;
}

message DeleteUserBlacklistResponse {
  bool   success = 1;
  string message = 2;
}

message ReloadUserBlacklistCacheRequest {}

message ReloadUserBlacklistCacheResponse {
  bool   success = 1;
  string message = 2;
}

// ─── API Log 相关消息 ─────────────────────────────────────────────────────────

// API 日志列表查询
message ListApiLogsRequest {
  PaginationRequest pagination  = 1;
  optional string   path        = 2; // 按路径前缀过滤，如 "/api/v1/tenant/deposit"
  optional int32    status_code = 3; // 按 HTTP 状态码过滤，如 500
  optional string   date_from   = 4; // ISO 8601 格式
  optional string   date_to     = 5; // ISO 8601 格式
  optional int32    page        = 6; // 兼容前端直接传 page
  optional int32    size        = 7; // 兼容前端直接传 size
}

message ListApiLogsResponse {
  repeated ApiLog data = 1;
  PaginationMeta  criteria = 2;
}

// ─── Statistics 相关消息 ──────────────────────────────────────────────────────

// 在线用户响应：按 tenant 分组，每组含浏览器和设备统计
message OnlineUsersResponse {
  repeated OnlineTenantStat items = 1;
}

// 单个 tenant 的在线用户统计
message OnlineTenantStat {
  int64             tenant_id   = 1; // Tenant ID
  int32             total       = 2; // 该 tenant 在线用户总数
  map<string, int64> device_stat = 3; // 设备统计，如 {"Windows": 3, "Mac": 1}
  map<string, int64> client_stat = 4; // 浏览器统计，如 {"Chrome": 3, "Safari": 1}
}

// 在线管理员条目（GetOnlineAdmins 专用）
message OnlineUser {
  int64  party_id  = 1; // 用户 party_id
  string email     = 2; // 用户邮箱
  string since     = 3; // 上线时间，ISO 8601 格式
  int64  tenant_id = 4; // 所属 Tenant ID（用于前端按 tenant 分组）
}

// 在线管理员响应
message OnlineAdminsResponse {
  int32            count = 1;
  repeated OnlineUser users = 2;
}

// MT 服务器列表响应
message ServersResponse {
  repeated ServerItem servers = 1;
}

// MT 服务器实体
message ServerItem {
  int32  id   = 1; // 服务器 ID（对应 TradeServiceItem.id）
  string name = 2; // 服务器名称
  string host = 3; // 服务器主机地址，如 "mt5.example.com:443"
}

// MT 服务器指标列表响应
message ServerMetricsResponse {
  repeated ServerMetric metrics = 1;
}

// MT 服务器实时指标
message ServerMetric {
  int32  server_id  = 1; // MT 服务器 ID
  double cpu_usage  = 2; // CPU 使用率（0.0–1.0）
  double mem_usage  = 3; // 内存使用率（0.0–1.0）
  string updated_at = 4; // 指标采集时间，ISO 8601 格式
}

message GetOnlineAdminsRequest {}

message GetOnlineAdminsResponse {
  OnlineAdminsResponse data = 1;
}

message GetOnlineUsersRequest {}

message GetOnlineUsersResponse {
  OnlineUsersResponse data = 1;
}

message GetServersRequest {}

message GetServersResponse {
  ServersResponse data = 1;
}

message GetServerMetricsRequest {}

message GetServerMetricsResponse {
  ServerMetricsResponse data = 1;
}

// ─── Tenant Admin RBAC API (api/v1/tenant/admin) ─────────────────────────────
// 后台管理员账户、角色与权限管理：查询管理员列表、角色/权限 CRUD，
// 以及用户角色/权限的切换（toggle）操作。

// HTTP 路由全部由 MVC AdminController 处理
service TenantAdminService {
  rpc ListAdminUsers(ListAdminUsersRequest) returns (ListAdminUsersResponse) {}
  rpc GetAdminUser(GetAdminUserRequest) returns (GetAdminUserResponse) {}
  rpc ListAdminRoles(ListAdminRolesRequest) returns (ListAdminRolesResponse) {}
  rpc GetAdminRole(GetAdminRoleRequest) returns (GetAdminRoleResponse) {}
  rpc ListAdminPermissions(ListAdminPermissionsRequest) returns (ListAdminPermissionsResponse) {}
  rpc CreateAdminPermission(CreateAdminPermissionRequest) returns (CreateAdminPermissionResponse) {}
  rpc TogglePermission(TogglePermissionRequest) returns (TogglePermissionResponse) {}
  rpc ToggleUserRole(ToggleUserRoleRequest) returns (ToggleUserRoleResponse) {}
  rpc ToggleUserPermission(ToggleUserPermissionRequest) returns (ToggleUserPermissionResponse) {}
  rpc ToggleRolePermission(ToggleRolePermissionRequest) returns (ToggleRolePermissionResponse) {}
  rpc GetUserPermissionsByPartyId(GetUserPermissionsByPartyIdRequest) returns (GetUserPermissionsByPartyIdResponse) {}
}

// ─── Admin RBAC 相关消息 ──────────────────────────────────────────────────────

// 管理员用户实体（与 UserAdminViewModel 对齐）
message AdminUser {
  int64  id          = 1; // 用户主键 ID
  int64  uid         = 2; // 账户维度标识 UID
  int64  party_id    = 3; // 跨 tenant 唯一标识
  string email       = 4; // 登录邮箱
  string first_name  = 5; // 名
  string last_name   = 6; // 姓
  string native_name = 7; // 本地语言姓名
  string avatar      = 8; // 头像 URL
  string language    = 9; // 用户语言偏好，如 "en-us"
  repeated int64 role_ids = 10; // 已分配角色 ID 列表
}

// 管理员用户详情（含权限明细）
message AdminUserDetail {
  AdminUser              user             = 1; // 用户基本信息
  repeated AdminPermission user_permissions = 2; // 用户直接权限列表
  repeated AdminPermission role_permissions = 3; // 通过角色继承的权限列表
  bool                   quiz_locked_out  = 4; // 是否因答题失败被锁定
}

// 权限实体（与 Permission 对齐）
message AdminPermission {
  int64  id         = 1; // 权限 ID
  string action     = 2; // 路由 action 表达式，如 "GET:/api/v1/tenant/deposit"
  string method     = 3; // HTTP 方法，如 "GET"、"POST"
  string category   = 4; // 权限分类，如 "deposit"、"account"
  string key        = 5; // 权限唯一 key，如 "deposit.view"
  bool   auth       = 6; // true = 需要认证
  string created_at = 7; // 创建时间，ISO 8601 格式
  string updated_at = 8; // 更新时间，ISO 8601 格式
}

// 角色实体
message AdminRole {
  int64  id   = 1; // 角色 ID
  string name = 2; // 角色名称，如 "admin"、"compliance"
}

// 角色详情（含关联权限 ID 列表）
message AdminRoleDetail {
  int64          id             = 1; // 角色 ID
  string         name           = 2; // 角色名称
  repeated int64 permission_ids = 3; // 该角色关联的权限 ID 列表
}

// 列表响应
message ListAdminUsersResponse {
  repeated AdminUser data = 1;
}

message AdminRolesResponse {
  repeated AdminRole data = 1;
}

message AdminPermissionsResponse {
  repeated AdminPermission data = 1;
}

// 用户权限详情响应（V2，按权限类型分组）
message UserPermissionsDetailResponse {
  repeated string user_permissions = 1; // 用户直接持有的权限 key 列表
  repeated string role_permissions = 2; // 通过角色继承的权限 key 列表
}

// ─── Admin RBAC 请求消息 ──────────────────────────────────────────────────────

message GetAdminUserRequest {
  int64 party_id = 1;
}

message GetAdminRoleRequest {
  int64 id = 1;
}

message ListAdminUsersRequest {}

message GetAdminUserResponse {
  AdminUserDetail data = 1;
}

message ListAdminRolesRequest {}

message ListAdminRolesResponse {
  AdminRolesResponse data = 1;
}

message GetAdminRoleResponse {
  AdminRoleDetail data = 1;
}

message ListAdminPermissionsRequest {}

message ListAdminPermissionsResponse {
  AdminPermissionsResponse data = 1;
}

// 创建权限请求（与 Permission.CreateSpec 对齐）
message CreateAdminPermissionRequest {
  bool   auth     = 1; // 是否需要认证
  string action   = 2; // 路由 action，如 "GET:/api/v1/tenant/deposit"
  string method   = 3; // HTTP 方法
  string category = 4; // 权限分类
  string key      = 5; // 权限唯一 key
}

message CreateAdminPermissionResponse {
  AdminPermission data = 1;
}

message TogglePermissionRequest {
  int64 id = 1; // 权限 ID
}

message ToggleUserRoleRequest {
  int64 id      = 1; // 用户主键 ID
  int64 role_id = 2; // 角色 ID
}

message ToggleUserPermissionRequest {
  int64 id            = 1; // 用户主键 ID
  int64 permission_id = 2; // 权限 ID
}

message ToggleRolePermissionRequest {
  int64 id            = 1; // 角色 ID
  int64 permission_id = 2; // 权限 ID
}

message TogglePermissionResponse {
  bool   success = 1;
  string message = 2;
}

message ToggleUserRoleResponse {
  bool   success = 1;
  string message = 2;
}

message ToggleUserPermissionResponse {
  bool   success = 1;
  string message = 2;
}

message ToggleRolePermissionResponse {
  bool   success = 1;
  string message = 2;
}

message GetUserPermissionsByPartyIdRequest {
  int64 party_id = 1; // 用户 party_id
}

message GetUserPermissionsByPartyIdResponse {
  UserPermissionsDetailResponse data = 1;
}
