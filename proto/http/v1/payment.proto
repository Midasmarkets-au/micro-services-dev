  }
  // 查询指定钱包的返佣流水
  rpc ListWalletRebates(ClientWalletServiceListWalletRebatesRequest) returns (ClientWalletServiceListWalletRebatesResponse) {
    option (google.api.http) = { get: "/api/v2/client/wallet/{hash_id}/rebate" };
  }
  // 查询指定钱包的退款流水
  rpc ListWalletRefunds(ClientWalletServiceListWalletRefundsRequest) returns (ClientWalletServiceListWalletRefundsResponse) {
    option (google.api.http) = { get: "/api/v2/client/wallet/{hash_id}/refund" };
  }
  // 查询指定钱包的手动调整记录
  rpc ListWalletAdjustments(ClientWalletServiceListWalletAdjustmentsRequest) returns (ClientWalletServiceListWalletAdjustmentsResponse) {
    option (google.api.http) = { get: "/api/v2/client/wallet/{hash_id}/adjust" };
  }
  // 查询指定钱包的下线奖励转入流水
  rpc ListDownlineRewardTransfers(ClientWalletServiceListDownlineRewardTransfersRequest) returns (ClientWalletServiceListDownlineRewardTransfersResponse) {
    option (google.api.http) = { get: "/api/v2/client/wallet/{hash_id}/downline-reward-transfer" };
  }
