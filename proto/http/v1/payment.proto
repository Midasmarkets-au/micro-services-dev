  }
  // 批量为指定账户启用一组支付方式（body 字段名为 spec，含 method_ids 列表）
  rpc EnableGroupForAccount(TenantPaymentMethodServiceEnableGroupForAccountRequest) returns (TenantPaymentMethodServiceEnableGroupForAccountResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account-group-enable/{account_id}", body: "spec" };
