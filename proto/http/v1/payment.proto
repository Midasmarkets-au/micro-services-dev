  rpc GetWithdrawal(ClientWithdrawalServiceGetWithdrawalRequest) returns (ClientWithdrawalServiceGetWithdrawalResponse) {
    option (google.api.http) = { get: "/api/v1/client/withdrawal/{id}" };
  }
  // 通过 hash_id 取消提款（hash_id 为路径参数）
  rpc CancelWithdrawal(ClientWithdrawalServiceCancelWithdrawalRequest) returns (ClientWithdrawalServiceCancelWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/client/withdrawal/{hash_id}/cancel" };
  }
  // 更新提款（如修改收款信息 payment_info_id 或备注 note）
  rpc UpdateWithdrawal(ClientWithdrawalServiceUpdateWithdrawalRequest) returns (ClientWithdrawalServiceUpdateWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/client/withdrawal/{id}", body: "spec" };
  }
  // 查询货币兑换比率
  rpc GetCurrencyConversion(ClientWithdrawalServiceGetCurrencyConversionRequest) returns (ClientWithdrawalServiceGetCurrencyConversionResponse) {
    option (google.api.http) = { get: "/api/v1/client/withdrawal/{from_currency_id}/to/{to_currency_id}" };
  }
}

