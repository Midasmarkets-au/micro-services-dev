// ─── Tenant Payment Method V2 API (api/v2/tenant/payment-method) ─────────────

service TenantPaymentMethodService {
  // 获取充值方式列表
  rpc ListDepositMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/deposit" };
  }
  // 获取提款方式列表
  rpc ListWithdrawalMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/withdrawal" };
  }
  // 获取单条
  rpc GetPaymentMethod(GetPaymentMethodRequest) returns (PaymentMethod) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}" };
  }
  // 创建
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (PaymentMethod) {
    option (google.api.http) = { post: "/api/v2/tenant/payment-method", body: "*" };
  }
  // 更新
  rpc UpdatePaymentMethod(UpdatePaymentMethodRequest) returns (PaymentMethod) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}", body: "spec" };
  }
  // 删除
  rpc DeletePaymentMethod(GetPaymentMethodRequest) returns (OperationResponse) {
    option (google.api.http) = { delete: "/api/v2/tenant/payment-method/{id}" };
  }
  // 恢复已删除
  rpc RestorePaymentMethod(GetPaymentMethodRequest) returns (PaymentMethod) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/restore" };
  }
  // 批量更新排序
  rpc BatchUpdateSort(BatchUpdateSortRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/batch-update-sort", body: "*" };
  }
  // 重载缓存
  rpc ReloadCache(EmptyRequest) returns (OperationResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/cache/reload" };
  }
  // 获取使用说明
  rpc GetInstruction(GetPaymentMethodRequest) returns (InstructionResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}/instruction" };
  }
  // 更新使用说明
  rpc UpdateInstruction(UpdateInstructionRequest) returns (InstructionResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/instruction", body: "content" };
  }
  // 获取政策
  rpc GetPolicy(GetPaymentMethodRequest) returns (PolicyResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}/policy" };
  }
  // 更新政策
  rpc UpdatePolicy(UpdatePolicyRequest) returns (PolicyResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/policy", body: "content" };
  }
  // 获取账户访问权限
  rpc GetAccountAccess(GetAccessRequest) returns (AccessResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/account/{account_id}/access" };
  }
  // 获取钱包访问权限
  rpc GetWalletAccess(GetWalletAccessRequest) returns (AccessResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/wallet/{wallet_id}/access" };
  }
  // 启用账户支付方式
  rpc EnableForAccount(EnableForAccountRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/account-enable/{account_id}" };
  }
  // 禁用账户支付方式
  rpc DisableForAccount(EnableForAccountRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/account-disable/{account_id}" };
  }
  // 批量启用账户组支付方式
  rpc EnableGroupForAccount(GroupAccessRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account-group-enable/{account_id}", body: "spec" };
  }
  // 批量禁用账户组支付方式
  rpc DisableGroupForAccount(GroupAccessRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account-group-disable/{account_id}", body: "spec" };
  }
  // 启用钱包支付方式
  rpc EnableForWallet(EnableForWalletRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/wallet-enable/{wallet_id}" };
  }
  // 禁用钱包支付方式
  rpc DisableForWallet(EnableForWalletRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/wallet-disable/{wallet_id}" };
  }
  // 批量启用钱包组支付方式
  rpc EnableGroupForWallet(WalletGroupAccessRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/wallet-group-enable/{wallet_id}", body: "spec" };
  }
  // 批量禁用钱包组支付方式
  rpc DisableGroupForWallet(WalletGroupAccessRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/wallet-group-disable/{wallet_id}", body: "spec" };
  }
  // 按已有账户开通
  rpc OpenByExisting(OpenByExistingRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account/open-by-existing", body: "*" };
  }
}

