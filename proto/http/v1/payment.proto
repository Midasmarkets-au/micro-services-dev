// ─── Client Deposit API (api/v1/client/deposit) ──────────────────────────────
// 客户端充值自助接口：查询、更新和取消充值，以及货币兑换查询。

service ClientDepositService {
  // 分页查询当前用户的充值记录；可按 account_uid、status 及日期范围过滤
  rpc ListDeposits(ClientDepositServiceListDepositsRequest) returns (ClientDepositServiceListDepositsResponse) {
    option (google.api.http) = { get: "/api/v1/client/deposit" };
  }
  // 按 id 获取充值详情
  rpc GetDeposit(ClientDepositServiceGetDepositRequest) returns (ClientDepositServiceGetDepositResponse) {
    option (google.api.http) = { get: "/api/v1/client/deposit/{id}" };
  }
  // 更新充值备注（body 字段名为 spec，spec.note 为备注内容）
  rpc UpdateDeposit(ClientDepositServiceUpdateDepositRequest) returns (ClientDepositServiceUpdateDepositResponse) {
    option (google.api.http) = { put: "/api/v1/client/deposit/{id}", body: "spec" };
  }
  // 取消充值（仅支持状态为 pending 的充值）
  rpc CancelDeposit(ClientDepositServiceCancelDepositRequest) returns (ClientDepositServiceCancelDepositResponse) {
    option (google.api.http) = { put: "/api/v1/client/deposit/{id}/cancel" };
  }
  // 获取充值回执文件 URL
  rpc GetDepositReceipt(ClientDepositServiceGetDepositReceiptRequest) returns (ClientDepositServiceGetDepositReceiptResponse) {
    option (google.api.http) = { get: "/api/v1/client/deposit/{id}/receipt" };
  }
  // 获取充值参考信息（银行转账参考号等）
  rpc GetDepositReference(ClientDepositServiceGetDepositReferenceRequest) returns (ClientDepositServiceGetDepositReferenceResponse) {
    option (google.api.http) = { get: "/api/v1/client/deposit/{id}/reference" };
  }
  // 查询货币兑换比率（from_currency_id 和 to_currency_id 为路径参数）
  rpc GetCurrencyConversion(ClientDepositServiceGetCurrencyConversionRequest) returns (ClientDepositServiceGetCurrencyConversionResponse) {
    option (google.api.http) = { get: "/api/v1/client/deposit/{from_currency_id}/to/{to_currency_id}" };
  }
}

// ─── Client Withdrawal API (api/v1/client/withdrawal) ────────────────────────
// 客户端提款自助接口：查询、更新和取消提款，以及货币兑换查询。

service ClientWithdrawalService {
  // 分页查询当前用户的提款记录
  rpc ListWithdrawals(ClientWithdrawalServiceListWithdrawalsRequest) returns (ClientWithdrawalServiceListWithdrawalsResponse) {
