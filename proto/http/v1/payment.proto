// ─── Messages ────────────────────────────────────────────────────────────────

message EmptyRequest {}

message OperationResponse {
  bool   success = 1;
  string message = 2;
}

// Deposit 实体
message Deposit {
  int64  id           = 1;
  string hash_id      = 2;
  int64  account_uid  = 3;
  double amount       = 4;
  string currency     = 5;
  int32  status       = 6;
  string created_at   = 7;
  string updated_at   = 8;
}

// Withdrawal 实体
message Withdrawal {
  int64  id           = 1;
  string hash_id      = 2;
  int64  account_uid  = 3;
  double amount       = 4;
  string currency     = 5;
  int32  status       = 6;
  string created_at   = 7;
  string updated_at   = 8;
}

// Payment 实体
message Payment {
  int64  id         = 1;
  double amount     = 2;
  string currency   = 3;
  int32  status     = 4;
  int32  type       = 5;
  string created_at = 6;
}

// Transaction 实体（含 TX 前缀避免与 account.proto 中 Transfer 冲突）
message TxTransaction {
  int64  id          = 1;
  int64  account_uid = 2;
  double amount      = 3;
  string type        = 4;
  int32  status      = 5;
  string created_at  = 6;
}

// Wallet 实体
message Wallet {
  int64  id          = 1;
  string hash_id     = 2;
  int64  account_uid = 3;
  double balance     = 4;
  string currency    = 5;
  int32  fund_type   = 6;
  string created_at  = 7;
}

// WalletAdjustment 实体
message WalletAdjustment {
  int64  id        = 1;
  int64  wallet_id = 2;
  double amount    = 3;
  string reason    = 4;
  string created_at = 5;
}

// PaymentInfo 实体
message PaymentInfo {
  int64  id         = 1;
  int64  account_uid = 2;
  int32  type       = 3;
  string details    = 4;
  int32  status     = 5;
  string created_at = 6;
}

// PaymentMethod 实体
message PaymentMethod {
  int64  id          = 1;
  string name        = 2;
  int32  type        = 3;  // 0=deposit, 1=withdrawal, 2=both
  int32  status      = 4;
  int32  sort_order  = 5;
  string created_at  = 6;
}

