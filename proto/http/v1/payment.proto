syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";
option go_package = "proto/http/v1;httpv1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Deposit API (api/v1/tenant/deposit) ──────────────────────────────
// 管理充值（Deposit）的完整生命周期：创建、审批、拒绝、完成及外部支付查询。
// 状态流转：created → complete_payment → approve → complete / cancel / reject / delete
// 外部链接（exlink）接口用于查询第三方支付网关的实时收款状态。

service TenantDepositService {
  // 分页查询充值记录；可按 account_uid、status、货币及日期范围过滤
  rpc ListDeposits(TenantDepositServiceListDepositsRequest) returns (TenantDepositServiceListDepositsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit" };
  }
  // 按 id 获取充值详情
  rpc GetDeposit(TenantDepositServiceGetDepositRequest) returns (TenantDepositServiceGetDepositResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/{id}" };
  }
  // 后台手动创建充值（指定账户、支付方式、金额及货币）
  rpc CreateDeposit(TenantDepositServiceCreateDepositRequest) returns (TenantDepositServiceCreateDepositResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/deposit", body: "*" };
  }
  // 取消充值（status → cancelled）
  rpc CancelDeposit(TenantDepositServiceCancelDepositRequest) returns (TenantDepositServiceCancelDepositResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/cancel" };
  }
  // 拒绝充值（status → rejected）
  rpc RejectDeposit(TenantDepositServiceRejectDepositRequest) returns (TenantDepositServiceRejectDepositResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/reject" };
  }
  // 标记支付已完成（用户付款后，后台确认收到资金，status → payment_complete）
  rpc CompletePayment(TenantDepositServiceCompletePaymentRequest) returns (TenantDepositServiceCompletePaymentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/complete-payment" };
  }
  // 批准充值（status → approved）
  rpc ApproveDeposit(TenantDepositServiceApproveDepositRequest) returns (TenantDepositServiceApproveDepositResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/approve" };
  }
  // 完成充值（触发入账到 MT 账户，status → completed）
  rpc CompleteDeposit(TenantDepositServiceCompleteDepositRequest) returns (TenantDepositServiceCompleteDepositResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/complete" };
  }
  // 软删除充值记录（status → deleted，不从数据库物理删除）
  rpc DeleteDeposit(TenantDepositServiceDeleteDepositRequest) returns (TenantDepositServiceDeleteDepositResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/deposit/{id}/delete" };
  }
  // 获取充值回执文件 URL（上传的付款凭证）
  rpc GetDepositReceipt(TenantDepositServiceGetDepositReceiptRequest) returns (TenantDepositServiceGetDepositReceiptResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/{id}/receipt" };
  }
  // 获取充值参考信息（如银行转账参考号）
  rpc GetDepositReference(TenantDepositServiceGetDepositReferenceRequest) returns (TenantDepositServiceGetDepositReferenceResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/{id}/reference" };
  }
  // 获取充值的状态机详情（当前状态及可用操作）
  rpc GetDepositStateDetail(TenantDepositServiceGetDepositStateDetailRequest) returns (TenantDepositServiceGetDepositStateDetailResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/{id}/state-detail" };
  }
  // 外部链接：通过 payment_number 查询第三方收款状态
  rpc GetExlinkCollectionStatus(TenantDepositServiceGetExlinkCollectionStatusRequest) returns (TenantDepositServiceGetExlinkCollectionStatusResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/exlink/collections/{payment_number}/status" };
  }
  // 外部链接：按货币获取可用支付类型列表
  rpc GetExlinkPaymentTypes(TenantDepositServiceGetExlinkPaymentTypesRequest) returns (TenantDepositServiceGetExlinkPaymentTypesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/exlink/payment-types" };
  }
  // 外部链接：获取所有可用货币列表
  rpc GetExlinkCurrencies(TenantDepositServiceGetExlinkCurrenciesRequest) returns (TenantDepositServiceGetExlinkCurrenciesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/exlink/currencies" };
  }
  // 外部链接：获取所有货币对汇率列表
  rpc GetExlinkExchangeRates(TenantDepositServiceGetExlinkExchangeRatesRequest) returns (TenantDepositServiceGetExlinkExchangeRatesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/deposit/exlink/exchange-rates" };
  }
}

// ─── Tenant Withdrawal API (api/v1/tenant/withdrawal) ────────────────────────
// 管理提款（Withdrawal）的完整生命周期：创建、审批、拒绝、退款等。
// 支持 OFA-DF（Out-of-fund Alternative Disbursement Framework）提款及恢复被取消/拒绝的记录。

service TenantWithdrawalService {
  // 分页查询提款记录；可按 account_uid、status、货币及日期范围过滤
  rpc ListWithdrawals(TenantWithdrawalServiceListWithdrawalsRequest) returns (TenantWithdrawalServiceListWithdrawalsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal" };
  }
  // 按 id 获取提款详情
  rpc GetWithdrawal(TenantWithdrawalServiceGetWithdrawalRequest) returns (TenantWithdrawalServiceGetWithdrawalResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/{id}" };
  }
  // 后台手动创建提款（指定账户、收款信息、金额及货币）
  rpc CreateWithdrawal(TenantWithdrawalServiceCreateWithdrawalRequest) returns (TenantWithdrawalServiceCreateWithdrawalResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/withdrawal", body: "*" };
  }
  // 从指定账户创建提款（body 字段名为 spec）
  rpc CreateWithdrawalFromAccount(CreateWithdrawalFromAccountRequest) returns (TenantWithdrawalServiceCreateWithdrawalFromAccountResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/withdrawal/from-account/{account_uid}", body: "spec" };
  }
  // 取消提款（status → cancelled）
  rpc CancelWithdrawal(TenantWithdrawalServiceCancelWithdrawalRequest) returns (TenantWithdrawalServiceCancelWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/cancel" };
  }
  // 批准提款（body 字段名为 spec，spec.note 为审批备注）
  rpc ApproveWithdrawal(ApproveWithdrawalRequest) returns (TenantWithdrawalServiceApproveWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/approve", body: "spec" };
  }
  // 拒绝提款（spec.reason 为拒绝原因）
  rpc RejectWithdrawal(RejectWithdrawalRequest) returns (TenantWithdrawalServiceRejectWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/reject", body: "spec" };
  }
  // 标记支付已完成（出款完成，status → payment_complete）
  rpc CompletePayment(TenantWithdrawalServiceCompletePaymentRequest) returns (TenantWithdrawalServiceCompletePaymentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/complete-payment" };
  }
  // 完成提款（status → completed）
  rpc CompleteWithdrawal(TenantWithdrawalServiceCompleteWithdrawalRequest) returns (TenantWithdrawalServiceCompleteWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/complete" };
  }
  // 恢复已取消的提款（重新进入待处理状态）
  rpc RestoreCancelledWithdrawal(TenantWithdrawalServiceRestoreCancelledWithdrawalRequest) returns (TenantWithdrawalServiceRestoreCancelledWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/cancel/{id}/restore" };
  }
  // 恢复已拒绝的提款（重新进入待处理状态）
  rpc RestoreRejectedWithdrawal(TenantWithdrawalServiceRestoreRejectedWithdrawalRequest) returns (TenantWithdrawalServiceRestoreRejectedWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/reject/{id}/restore" };
  }
  // 获取提款的银行账户信息（bank_name、account_no、account_name）
  rpc GetWithdrawalInfo(TenantWithdrawalServiceGetWithdrawalInfoRequest) returns (TenantWithdrawalServiceGetWithdrawalInfoResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/{id}/info" };
  }
  // 退款（将提款金额退回账户，status → refunded）
  rpc RefundWithdrawal(TenantWithdrawalServiceRefundWithdrawalRequest) returns (TenantWithdrawalServiceRefundWithdrawalResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/withdrawal/{id}/refund" };
  }
  // 创建 OFA-DF 提款（通过已有提款 id 发起替代出款渠道）
  rpc CreateOfaDfWithdrawal(TenantWithdrawalServiceCreateOfaDfWithdrawalRequest) returns (TenantWithdrawalServiceCreateOfaDfWithdrawalResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/withdrawal/ofa-df", body: "*" };
  }
  // 外部链接：按货币获取可用银行列表
  rpc GetExlinkBanks(TenantWithdrawalServiceGetExlinkBanksRequest) returns (TenantWithdrawalServiceGetExlinkBanksResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/exlink/banks" };
  }
  // 外部链接：通过 payment_number 查询第三方出款状态
  rpc GetExlinkPayoutStatus(TenantWithdrawalServiceGetExlinkPayoutStatusRequest) returns (TenantWithdrawalServiceGetExlinkPayoutStatusResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/exlink/payouts/{payment_number}/status" };
  }
  // 外部链接：按货币获取可用支付类型列表
  rpc GetExlinkPaymentTypes(TenantWithdrawalServiceGetExlinkPaymentTypesRequest) returns (TenantWithdrawalServiceGetExlinkPaymentTypesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/exlink/payment-types" };
  }
  // 外部链接：获取第三方支付网关当前余额
  rpc GetExlinkBalance(TenantWithdrawalServiceGetExlinkBalanceRequest) returns (TenantWithdrawalServiceGetExlinkBalanceResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/withdrawal/exlink/balance" };
  }
}

// ─── Tenant Payment API (api/v1/tenant/payment) ──────────────────────────────
// 管理通用支付记录（Payment），涵盖充提款之外的其他支付类型。
// 状态流转：pending → execute → complete / cancel

service TenantPaymentService {
  // 分页查询支付记录；可按 type、status 及日期范围过滤
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/payment" };
  }
  // 按 id 获取支付详情
  rpc GetPayment(TenantPaymentServiceGetPaymentRequest) returns (TenantPaymentServiceGetPaymentResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/payment/{id}" };
  }
  // 取消支付（status → cancelled）
  rpc CancelPayment(TenantPaymentServiceCancelPaymentRequest) returns (TenantPaymentServiceCancelPaymentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/payment/{id}/cancel" };
  }
  // 执行支付（触发实际资金划转，status → executing）
  rpc ExecutePayment(TenantPaymentServiceExecutePaymentRequest) returns (TenantPaymentServiceExecutePaymentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/payment/{id}/execute" };
  }
  // 完成支付（status → completed）
  rpc CompletePayment(TenantPaymentServiceCompletePaymentRequest) returns (TenantPaymentServiceCompletePaymentResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/payment/{id}/complete" };
  }
}

// ─── Tenant Transaction API (api/v1/tenant/transaction) ──────────────────────
// 管理内部资金流转（TxTransaction）：账户间转账、钱包入金及审批流程。
// 支持自动完成阈值配置（AutoCompleteSetting）。

service TenantTransactionService {
  // 分页查询流转记录；可按 account_uid、status 及日期范围过滤
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/transaction" };
  }
  // 按 id 获取流转记录详情
  rpc GetTransaction(TenantTransactionServiceGetTransactionRequest) returns (TenantTransactionServiceGetTransactionResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/transaction/{id}" };
  }
  // 获取自动完成配置（enabled=true 时，低于 threshold 金额的流转自动完成）
  rpc GetAutoCompleteSetting(TenantTransactionServiceGetAutoCompleteSettingRequest) returns (TenantTransactionServiceGetAutoCompleteSettingResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/transaction/auto-complete-setting" };
  }
  // 更新自动完成配置
  rpc UpdateAutoCompleteSetting(UpdateAutoCompleteSettingRequest) returns (TenantTransactionServiceUpdateAutoCompleteSettingResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/transaction/auto-complete-setting", body: "*" };
  }
  // 将资金转入 MT 交易账户（from_uid → to_uid，触发 MT 存款操作）
  rpc TransferToTradeAccount(TenantTransactionServiceTransferToTradeAccountRequest) returns (TenantTransactionServiceTransferToTradeAccountResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/transaction/to-trade-account", body: "*" };
  }
  // 将资金转入钱包
  rpc TransferToWallet(TenantTransactionServiceTransferToWalletRequest) returns (TenantTransactionServiceTransferToWalletResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/transaction/to-wallet", body: "*" };
  }
  // 取消流转（status → cancelled）
  rpc CancelTransaction(TenantTransactionServiceCancelTransactionRequest) returns (TenantTransactionServiceCancelTransactionResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/transaction/{id}/cancel" };
  }
  // 拒绝流转（status → rejected）
  rpc RejectTransaction(TenantTransactionServiceRejectTransactionRequest) returns (TenantTransactionServiceRejectTransactionResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/transaction/{id}/reject" };
  }
  // 批准流转（status → approved，触发实际划转）
  rpc ApproveTransaction(TenantTransactionServiceApproveTransactionRequest) returns (TenantTransactionServiceApproveTransactionResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/transaction/{id}/approve" };
  }
}

// ─── Tenant Wallet API (api/v1/tenant/wallet) ────────────────────────────────
// 管理用户钱包（Wallet）：查询、快照统计、资金类型更新及手动调整。
// 每个用户可拥有多个钱包（按货币或资金类型区分）。

service TenantWalletService {
  // 分页查询钱包列表；可按 account_uid、fund_type 及货币过滤
  rpc ListWallets(ListWalletsRequest) returns (TenantWalletServiceListWalletsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet" };
  }
  // 按 wallet_id 获取钱包详情
  rpc GetWallet(GetWalletRequest) returns (TenantWalletServiceGetWalletResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet/{wallet_id}" };
  }
  // 获取钱包余额快照列表（每日余额历史）
  rpc GetWalletSnapshot(TenantWalletServiceGetWalletSnapshotRequest) returns (TenantWalletServiceGetWalletSnapshotResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet/snapshot" };
  }
  // 获取钱包统计汇总（total_balance 和 wallet_count）
  rpc GetWalletStatistic(TenantWalletServiceGetWalletStatisticRequest) returns (TenantWalletServiceGetWalletStatisticResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet/statistic" };
  }
  // 分页查询指定钱包的流水记录
  rpc ListWalletTransactions(ListWalletTransactionsRequest) returns (ListWalletTransactionsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet/{wallet_id}/transaction" };
  }
  // 更新钱包的资金类型（fund_type 枚举）
  rpc UpdateWalletFundType(UpdateWalletFundTypeRequest) returns (TenantWalletServiceUpdateWalletFundTypeResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/wallet/{wallet_id}/fund-type" };
  }
  // 分页查询钱包手动调整记录；可按 wallet_id 及日期范围过滤
  rpc ListWalletAdjustments(ListWalletAdjustmentsRequest) returns (TenantWalletServiceListWalletAdjustmentsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/wallet/adjust" };
  }
  // 对钱包进行手动金额调整（body 字段名为 spec，含 amount 和 reason）
  rpc CreateWalletAdjustment(CreateWalletAdjustmentRequest) returns (TenantWalletServiceCreateWalletAdjustmentResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/wallet/{wallet_id}/adjust", body: "spec" };
  }
}

// ─── Tenant Payment Info API (api/v1/tenant/payment-info) ────────────────────
// 管理用户的收款信息（PaymentInfo），即提款时使用的银行账户或电子钱包信息。

service TenantPaymentInfoService {
  // 分页查询收款信息列表；可按 account_uid、type、status 过滤
  rpc ListPaymentInfos(ListPaymentInfosRequest) returns (ListPaymentInfosResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/payment-info" };
  }
  // 按 id 获取收款信息详情（含 details JSON）
  rpc GetPaymentInfo(TenantPaymentInfoServiceGetPaymentInfoRequest) returns (TenantPaymentInfoServiceGetPaymentInfoResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/payment-info/{id}" };
  }
  // 更新收款信息（body 字段名为 spec）
  rpc UpdatePaymentInfo(UpdatePaymentInfoRequest) returns (TenantPaymentInfoServiceUpdatePaymentInfoResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/payment-info/{id}", body: "spec" };
  }
  // 删除收款信息（不可恢复）
  rpc DeletePaymentInfo(TenantPaymentInfoServiceDeletePaymentInfoRequest) returns (TenantPaymentInfoServiceDeletePaymentInfoResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/payment-info/{id}" };
  }
}

// ─── Tenant Payment Method V2 API (api/v2/tenant/payment-method) ─────────────
// 管理充提款支付方式（PaymentMethod）的完整配置：
// 包括访问控制（按账户/钱包粒度）、使用说明、政策及排序管理。

service TenantPaymentMethodService {
  // 分页查询充值支付方式列表（type=deposit）；include_deleted=true 时包含已删除
  rpc ListDepositMethods(TenantPaymentMethodServiceListDepositMethodsRequest) returns (TenantPaymentMethodServiceListDepositMethodsResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/deposit" };
  }
  // 分页查询提款支付方式列表（type=withdrawal）
  rpc ListWithdrawalMethods(TenantPaymentMethodServiceListWithdrawalMethodsRequest) returns (TenantPaymentMethodServiceListWithdrawalMethodsResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/withdrawal" };
  }
  // 按 id 获取支付方式详情
  rpc GetPaymentMethod(TenantPaymentMethodServiceGetPaymentMethodRequest) returns (TenantPaymentMethodServiceGetPaymentMethodResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}" };
  }
  // 创建支付方式（含 name、type、details）
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (TenantPaymentMethodServiceCreatePaymentMethodResponse) {
    option (google.api.http) = { post: "/api/v2/tenant/payment-method", body: "*" };
  }
  // 更新支付方式（body 字段名为 spec）
  rpc UpdatePaymentMethod(UpdatePaymentMethodRequest) returns (TenantPaymentMethodServiceUpdatePaymentMethodResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}", body: "spec" };
  }
  // 软删除支付方式（status → deleted）
  rpc DeletePaymentMethod(TenantPaymentMethodServiceDeletePaymentMethodRequest) returns (TenantPaymentMethodServiceDeletePaymentMethodResponse) {
    option (google.api.http) = { delete: "/api/v2/tenant/payment-method/{id}" };
  }
  // 恢复已删除的支付方式（status → active）
  rpc RestorePaymentMethod(TenantPaymentMethodServiceRestorePaymentMethodRequest) returns (TenantPaymentMethodServiceRestorePaymentMethodResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/restore" };
  }
  // 批量更新支付方式排序顺序
  rpc BatchUpdateSort(BatchUpdateSortRequest) returns (TenantPaymentMethodServiceBatchUpdateSortResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/batch-update-sort", body: "*" };
  }
  // 重载支付方式缓存（修改后需调用以使变更立即生效）
  rpc ReloadCache(TenantPaymentMethodServiceReloadCacheRequest) returns (TenantPaymentMethodServiceReloadCacheResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/cache/reload" };
  }
  // 获取支付方式的多语言使用说明（map<language, content>）
  rpc GetInstruction(TenantPaymentMethodServiceGetInstructionRequest) returns (TenantPaymentMethodServiceGetInstructionResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}/instruction" };
  }
  // 更新支付方式的多语言使用说明（body 字段名为 content）
  rpc UpdateInstruction(UpdateInstructionRequest) returns (TenantPaymentMethodServiceUpdateInstructionResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/instruction", body: "content" };
  }
  // 获取支付方式的多语言政策说明
  rpc GetPolicy(TenantPaymentMethodServiceGetPolicyRequest) returns (TenantPaymentMethodServiceGetPolicyResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/{id}/policy" };
  }
  // 更新支付方式的多语言政策说明
  rpc UpdatePolicy(UpdatePolicyRequest) returns (TenantPaymentMethodServiceUpdatePolicyResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/policy", body: "content" };
  }
  // 获取指定账户的可用支付方式 ID 列表（已启用的方式）
  rpc GetAccountAccess(TenantPaymentMethodServiceGetAccountAccessRequest) returns (TenantPaymentMethodServiceGetAccountAccessResponse) {
    option (google.api.http) = { get: "/api/v2/tenant/payment-method/account/{account_id}/access" };
  }
  // 获取指定钱包的可用支付方式 ID 列表
