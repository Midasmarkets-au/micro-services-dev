// ─── Messages ────────────────────────────────────────────────────────────────

// 充值实体
message Deposit {
  int64  id          = 1; // 充值记录 ID
  string hash_id     = 2; // 哈希 ID（URL 友好，对外暴露）
  int64  account_uid = 3; // 关联账户 ID
  double amount      = 4; // 充值金额
  string currency    = 5; // 货币代码，如 "USD"、"AUD"
  int32  status      = 6; // 充值状态：0=pending、1=payment_complete、2=approved、3=completed、4=cancelled、5=rejected
  string created_at  = 7; // 创建时间，ISO 8601 格式
  string updated_at  = 8; // 最后更新时间，ISO 8601 格式
}

// 提款实体
message Withdrawal {
  int64  id          = 1; // 提款记录 ID
  string hash_id     = 2; // 哈希 ID（URL 友好）
  int64  account_uid = 3; // 关联账户 ID
  double amount      = 4; // 提款金额
  string currency    = 5; // 货币代码
  int32  status      = 6; // 提款状态：0=pending、1=approved、2=payment_complete、3=completed、4=cancelled、5=rejected、6=refunded
  string created_at  = 7; // 创建时间，ISO 8601 格式
  string updated_at  = 8; // 最后更新时间，ISO 8601 格式
}

// 通用支付记录实体
message Payment {
  int64  id         = 1; // 支付记录 ID
  double amount     = 2; // 支付金额
  string currency   = 3; // 货币代码
  int32  status     = 4; // 状态：0=pending、1=executing、2=completed、3=cancelled
  int32  type       = 5; // 支付类型（枚举，如 1=deposit、2=withdrawal、3=rebate 等）
  string created_at = 6; // 创建时间，ISO 8601 格式
}

// 内部资金流转实体（TX 前缀避免与 account.proto 中 Transfer 命名冲突）
message TxTransaction {
  int64  id          = 1; // 流转记录 ID
  int64  account_uid = 2; // 关联账户 ID
  double amount      = 3; // 流转金额（正=收入，负=支出）
  string type        = 4; // 流转类型字符串，如 "transfer"、"wallet_in"
  int32  status      = 5; // 状态：0=pending、1=approved、2=completed、3=cancelled、4=rejected
  string created_at  = 6; // 创建时间，ISO 8601 格式
}

// 钱包实体
message Wallet {
  int64  id          = 1; // 钱包 ID
  string hash_id     = 2; // 钱包哈希 ID（URL 友好）
  int64  account_uid = 3; // 关联账户 ID
  double balance     = 4; // 当前余额
  string currency    = 5; // 货币代码，如 "USD"
  int32  fund_type   = 6; // 资金类型枚举（如 1=real、2=bonus、3=rebate 等）
  string created_at  = 7; // 创建时间，ISO 8601 格式
}

// 钱包手动调整记录实体
message WalletAdjustment {
  int64  id         = 1; // 调整记录 ID
  int64  wallet_id  = 2; // 关联钱包 ID
  double amount     = 3; // 调整金额（正=增加，负=扣减）
  string reason     = 4; // 调整原因说明
  string created_at = 5; // 创建时间，ISO 8601 格式
}

// 收款信息实体（用户保存的银行账户/电子钱包等）
message PaymentInfo {
  int64  id          = 1; // 收款信息 ID
  int64  account_uid = 2; // 关联账户 ID
  int32  type        = 3; // 收款信息类型（枚举，如 1=bank_transfer、2=crypto 等）
  string details     = 4; // 收款信息详情（JSON 字符串，含账号、银行名等）
  int32  status      = 5; // 状态：0=inactive、1=active、2=deleted
  string created_at  = 6; // 创建时间，ISO 8601 格式
}

// 支付方式实体
message PaymentMethod {
  int64  id         = 1; // 支付方式 ID
  string name       = 2; // 支付方式名称，如 "Bank Transfer"、"USDT"
  int32  type       = 3; // 适用类型：0=deposit、1=withdrawal、2=both
  int32  status     = 4; // 状态：0=inactive、1=active、2=deleted
  int32  sort_order = 5; // 前端展示排序权重（数值越小越靠前）
  string created_at = 6; // 创建时间，ISO 8601 格式
}

