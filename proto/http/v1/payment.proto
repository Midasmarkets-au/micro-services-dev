}

// 更新多语言政策请求
message UpdatePolicyRequest {
  int64               id      = 1;
  map<string, string> content = 2;
}

// 账户访问权限查询请求
message GetAccessRequest {
  int64 account_id = 1;
}

// 钱包访问权限查询请求
