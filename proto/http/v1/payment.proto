    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account-group-disable/{account_id}", body: "spec" };
  }
  // 为指定钱包启用某支付方式
  rpc EnableForWallet(EnableForWalletRequest) returns (TenantPaymentMethodServiceEnableForWalletResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/wallet-enable/{wallet_id}" };
  }
  // 为指定钱包禁用某支付方式
  rpc DisableForWallet(TenantPaymentMethodServiceDisableForWalletRequest) returns (TenantPaymentMethodServiceDisableForWalletResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/{id}/wallet-disable/{wallet_id}" };
  }
  // 批量为指定钱包启用一组支付方式
  rpc EnableGroupForWallet(TenantPaymentMethodServiceEnableGroupForWalletRequest) returns (TenantPaymentMethodServiceEnableGroupForWalletResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/wallet-group-enable/{wallet_id}", body: "spec" };
  }
  // 批量为指定钱包禁用一组支付方式
  rpc DisableGroupForWallet(TenantPaymentMethodServiceDisableGroupForWalletRequest) returns (TenantPaymentMethodServiceDisableGroupForWalletResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/wallet-group-disable/{wallet_id}", body: "spec" };
  }
  // 按已有账户的支付方式配置开通目标账户（复制 source_account 的配置到 target_account）
  rpc OpenByExisting(OpenByExistingRequest) returns (TenantPaymentMethodServiceOpenByExistingResponse) {
    option (google.api.http) = { put: "/api/v2/tenant/payment-method/account/open-by-existing", body: "*" };
  }
