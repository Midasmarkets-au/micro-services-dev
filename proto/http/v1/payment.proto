  int64 wallet_id = 1;
}

// 已启用支付方式 ID 列表响应
message AccessResponse {
  repeated int64 enabled_method_ids = 1; // 已启用的支付方式 ID 列表
}

// 单个账户支付方式启用/禁用请求
message EnableForAccountRequest {
  int64 id         = 1; // 支付方式 ID
  int64 account_id = 2;
}

// 账户组批量访问控制请求
message GroupAccessRequest {
  int64           account_id = 1;
  GroupAccessSpec spec       = 2;
}

// 支付方式组规格
message GroupAccessSpec {
  repeated int64 method_ids = 1; // 支付方式 ID 列表
}

// 单个钱包支付方式启用/禁用请求
message EnableForWalletRequest {
  int64 id        = 1; // 支付方式 ID
  int64 wallet_id = 2;
}

// 钱包组批量访问控制请求
message WalletGroupAccessRequest {
  int64           wallet_id = 1;
  GroupAccessSpec spec      = 2;
}

// 按已有账户开通请求
message OpenByExistingRequest {
  int64 source_account_id = 1; // 复制来源账户 ID
  int64 target_account_id = 2; // 目标账户 ID
}

// ─── Deposit/Withdrawal 辅助响应 ──────────────────────────────────────────────

// 充值回执响应（付款凭证文件）
message DepositReceiptResponse {
  string url      = 1; // 凭证文件 URL
  string filename = 2; // 原始文件名
}

// 充值参考信息响应
message DepositReferenceResponse {
  string reference = 1; // 参考号（如银行转账参考号）
  string note      = 2; // 附加说明
}

// 状态机详情响应
message StateDetailResponse {
  string state  = 1; // 当前状态字符串
  string detail = 2; // 状态详情说明
}

// 提款银行信息响应
message WithdrawalInfoResponse {
  string bank_name    = 1; // 银行名称
  string account_no   = 2; // 银行账号
  string account_name = 3; // 账户持有人姓名
}

// 外部链接状态响应
message ExlinkStatusResponse {
  string status  = 1; // 第三方状态字符串
  string message = 2; // 附加说明
}

// 外部链接查询请求（by payment_number）
message GetExlinkByPaymentNumberRequest {
  string payment_number = 1; // 第三方支付流水号
}

// 外部链接支付类型列表响应
message ExlinkPaymentTypesResponse {
  repeated ExlinkPaymentType types = 1;
}

// 外部支付类型实体
message ExlinkPaymentType {
  string id   = 1; // 支付类型 ID（字符串）
  string name = 2; // 支付类型名称
}

// 可用货币列表响应
message CurrenciesResponse {
  repeated string currencies = 1; // 货币代码列表，如 ["USD", "AUD", "USDT"]
}

// 汇率列表响应（外部链接）
message ExchangeRatesResponse {
  repeated ExchangeRateItem rates = 1;
}

// 汇率条目
message ExchangeRateItem {
  string from_currency = 1;
  string to_currency   = 2;
  double rate          = 3;
}

// 银行列表响应
message BanksResponse {
  repeated BankItem banks = 1;
}

// 银行条目
message BankItem {
  string id   = 1; // 银行 ID（字符串）
  string name = 2; // 银行名称
}

// 余额查询响应
message BalanceResponse {
  double balance  = 1; // 账户余额
  string currency = 2; // 货币代码
}

// 按货币查询请求
message GetByCurrencyRequest {
  string currency = 1; // 货币代码
}

// ─── 客户端 Deposit/Withdrawal 更新消息 ───────────────────────────────────────

// 客户端更新充值请求
message UpdateClientDepositRequest {
  int64             id   = 1;
  UpdateDepositSpec spec = 2;
}

// 充值更新规格
message UpdateDepositSpec {
  string note = 1; // 备注
}

// 客户端更新提款请求
message UpdateClientWithdrawalRequest {
  int64                id   = 1;
  UpdateWithdrawalSpec spec = 2;
}

// 提款更新规格
message UpdateWithdrawalSpec {
  int64  payment_info_id = 1; // 新收款信息 ID（修改收款账户）
  string note            = 2; // 备注
}

// 通过 hash_id 取消提款请求
message CancelByHashIdRequest {
  string hash_id = 1;
}

// 货币兑换查询请求
message GetCurrencyConversionRequest {
  int32 from_currency_id = 1; // 来源货币 ID
  int32 to_currency_id   = 2; // 目标货币 ID
}

// 货币兑换响应
message CurrencyConversionResponse {
  double rate   = 1; // 兑换汇率
  double amount = 2; // 换算后的金额（基于输入金额计算）
}

// ─── Client Wallet 相关消息 ───────────────────────────────────────────────────

// 客户端钱包列表查询
message ListClientWalletsRequest {
  PaginationRequest pagination = 1;
  optional string   currency   = 2; // 按货币过滤
}

// 按 hash_id 查询钱包流水请求（支持分页和日期范围）
message GetClientWalletRequest {
  string            hash_id    = 1; // 钱包哈希 ID
  PaginationRequest pagination = 2;
  optional string   date_from  = 3; // ISO 8601 格式
  optional string   date_to    = 4; // ISO 8601 格式
}

// 从钱包创建提款请求
message CreateWalletWithdrawalRequest {
  string                     hash_id = 1; // 钱包哈希 ID
  CreateWalletWithdrawalSpec spec    = 2;
}

// 从钱包提款规格
message CreateWalletWithdrawalSpec {
  int64  payment_info_id = 1; // 收款信息 ID
  double amount          = 2;
  string currency        = 3;
}
