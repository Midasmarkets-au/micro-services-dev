// ─── Messages ────────────────────────────────────────────────────────────────

message EmptyRequest {}

message OperationResponse {
  bool   success = 1;
  string message = 2;
}

// Rebate 实体
message Rebate {
  int64  id          = 1;
  int64  account_id  = 2;
  int64  trade_id    = 3;
  double amount      = 4;
  string currency    = 5;
  int32  status      = 6;
  string created_at  = 7;
}

// RebateAgentRule 实体
message RebateAgentRule {
  int64  id         = 1;
  int64  account_id = 2;
  int32  status     = 3;
  string created_at = 4;
}

// RebateClientRule 实体
message RebateClientRule {
  int64  id                  = 1;
  int64  account_id          = 2;
  int32  distribution_type   = 3;
  int32  status              = 4;
}

// RebateDirectRule 实体
message RebateDirectRule {
  int64  id          = 1;
  int64  account_id  = 2;
  int64  schema_id   = 3;
  int32  status      = 4;
  string created_at  = 5;
}

// RebateBaseSchema 实体
message RebateBaseSchema {
  int64              id     = 1;
  string             name   = 2;
  int32              status = 3;
  repeated RebateSchemaItem items = 4;
}

// RebateDirectSchema 实体
message RebateDirectSchema {
  int64              id      = 1;
  string             name    = 2;
  string             remark  = 3;
  int32              status  = 4;
  repeated RebateSchemaItem items = 5;
}

// RebateSchemaItem 实体（base 和 direct schema 共用）
message RebateSchemaItem {
  int64  id        = 1;
  int64  schema_id = 2;
  string symbol    = 3;
  double rate      = 4;
  string currency  = 5;
}

// RebateSchemaBundle 实体
message RebateSchemaBundle {
  int64  id         = 1;
  string name       = 2;
  int32  status     = 3;
  string created_at = 4;
}

// SalesRebate 实体
message SalesRebate {
  int64  id         = 1;
  int64  account_id = 2;
  double amount     = 3;
  int32  status     = 4;
  string created_at = 5;
}

// SalesRebateSchema 实体
message SalesRebateSchema {
  int64  id         = 1;
  string name       = 2;
  int32  status     = 3;
  string created_at = 4;
}

// TradeRebate 实体
message TradeRebate {
  int64  id             = 1;
  int64  trade_id       = 2;
  double amount         = 3;
  int32  status         = 4;
  string created_at     = 5;
}

// LevelSetting (shared)
message LevelSettingResponse {
  repeated LevelSetting levels = 1;
}

message LevelSetting {
  int32  level  = 1;
  string name   = 2;
  double amount = 3;
}

// Rebate list
message ListRebatesRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_id  = 2;
  optional int32    status      = 3;
  optional string   date_from   = 4;
  optional string   date_to     = 5;
  optional string   symbol      = 6;
}

message ListRebatesResponse {
  repeated Rebate data = 1;
  PaginationMeta  meta = 2;
}

message GetRebateRequest {
  int64 id = 1;
}

message DisableReleaseRequest {
  optional int64 time_in_minutes = 1;
}

message ResendRebateRequest {
  int64 rebate_id = 1;
}

message RebateSymbolsResponse {
  repeated string symbols = 1;
}

message RebateSymbolCategoriesResponse {
  repeated string categories = 1;
}

// RebateAgentRule messages
message ListRebateAgentRulesRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_id  = 2;
  optional int32    status      = 3;
}

message ListRebateAgentRulesResponse {
  repeated RebateAgentRule data = 1;
  PaginationMeta           meta = 2;
}

message GetRebateRuleRequest {
  int64 id = 1;
}

message CreateRebateAgentRuleRequest {
  int64 account_id = 1;
  int64 schema_id  = 2;
}

message UpdateRebateAgentRuleRequest {
  int64                   id   = 1;
  UpdateRebateAgentRuleSpec spec = 2;
}

message UpdateRebateAgentRuleSpec {
  int32 status = 1;
}

message UpdateLevelSettingRequest {
  int64              id   = 1;
  RebateLevelSchema  spec = 2;
}

message RebateLevelSchema {
  repeated LevelSetting levels = 1;
}

message UpdateSchemaRequest {
  int64             id   = 1;
  RebateLevelSchema spec = 2;
}

message GetDefaultLevelSettingRequest {
  int64 account_id = 1;
}

// RebateClientRule messages
message ListRebateClientRulesRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2;
}

message ListRebateClientRulesResponse {
  repeated RebateClientRule data = 1;
  PaginationMeta            meta = 2;
}

message UpdateDistributionTypeRequest {
  int64                       id   = 1;
  UpdateRebateClientRuleSpec  spec = 2;
}

message UpdateRebateClientRuleSpec {
  int32 distribution_type = 1;
}

// RebateDirectRule messages
message ListRebateDirectRulesRequest {
  PaginationRequest pagination = 1;
  optional int64    account_id = 2;
