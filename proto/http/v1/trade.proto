  }
}

// ─── Client Trade Service API (api/v1/client/trade) ──────────────────────────
// 客户端只读查询 MT 服务列表（用于开户时选择交易服务器）。

service ClientTradeService {
  // 获取客户端可用的 MT 交易服务列表
  rpc ListServices(EmptyRequest) returns (TradeServicesResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade/service" };
  }
}

