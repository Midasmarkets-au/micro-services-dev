syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Trade Account API (api/v1/tenant/trade-account) ─────────────────

service TenantTradeAccountService {
  // 列表查询
  rpc ListTradeAccounts(ListTradeAccountsRequest) returns (ListTradeAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account" };
  }
  // 获取单条
  rpc GetTradeAccount(GetTradeAccountRequest) returns (TradeAccount) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account/{uid}" };
  }
  // 创建交易账户
  rpc CreateTradeAccount(CreateTradeAccountRequest) returns (TradeAccount) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account", body: "*" };
  }
  // 设置返佣规则模板
  rpc SetRebateRuleTemplate(SetRebateRuleTemplateRequest) returns (TradeAccount) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{id}/template/{rebate_rule_template_id}" };
  }
  // 获取只读密码
  rpc GetReadOnlyCode(GetTradeAccountRequest) returns (ReadOnlyCodeResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account/{uid}/read-only-code" };
  }
  // 预览只读密码通知邮件
  rpc PreviewReadOnlyCodeNotice(ReadOnlyCodeNoticeRequest) returns (EmailPreviewResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account/{id}/read-only-code/notice/preview" };
  }
  // 发送只读密码通知邮件
  rpc SendReadOnlyCodeNotice(ReadOnlyCodeNoticeRequest) returns (OperationResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account/{id}/read-only-code/notice" };
  }
  // 更新杠杆
  rpc UpdateLeverage(UpdateLeverageRequest) returns (TradeAccount) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{account_id}/leverage/{leverage}" };
  }
  // 检查余额
  rpc CheckBalance(GetTradeAccountRequest) returns (TradeAccount) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{uid}/check-balance" };
  }
}

// ─── Tenant Trade Demo Account API (api/v1/tenant/trade-demo-account) ────────

service TenantTradeDemoAccountService {
  // 列表查询
  rpc ListTradeDemoAccounts(ListTradeDemoAccountsRequest) returns (ListTradeDemoAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-demo-account" };
  }
  // 删除模拟账户
  rpc DeleteTradeDemoAccount(GetTradeAccountRequest) returns (OperationResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/trade-demo-account/{uid}" };
  }
}

// ─── Tenant Trade API (api/v1/tenant/trade) ──────────────────────────────────

service TenantTradeService {
  // 交易记录列表
  rpc ListTrades(ListTradesRequest) returns (ListTradesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade" };
  }
  // 获取服务列表
  rpc ListServices(EmptyRequest) returns (TradeServicesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade/service" };
  }
  // 获取服务分组
  rpc GetServiceGroups(GetServiceRequest) returns (ServiceGroupsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade/service/{id}/group" };
  }
  // 添加服务分组
  rpc AddServiceGroup(AddServiceGroupRequest) returns (ServiceGroupsResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade/service/{id}/group", body: "spec" };
  }
  // 删除服务分组
  rpc DeleteServiceGroup(DeleteServiceGroupRequest) returns (ServiceGroupsResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/trade/service/{id}/group" };
  }
  // 更新服务分组
  rpc UpdateServiceGroups(UpdateServiceGroupsRequest) returns (ServiceGroupsResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/trade/service/{id}/group", body: "spec" };
  }
}

// ─── Tenant Trade Password API (api/v1/tenant/tradepassword) ─────────────────

service TenantTradePasswordService {
  // 重置 CRM 密码
  rpc ResetCrmPassword(ResetCrmPasswordRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/tradepassword/account/{account_id}/crm-password/reset", body: "request" };
  }
  // 获取初始交易密码
  rpc GetInitialTradePassword(GetTradeAccountIdRequest) returns (InitialPasswordResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradepassword/account/{account_id}/trade-password/initial" };
  }
  // 修改主密码
  rpc ChangeMainPassword(ChangeTradePasswordRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/tradepassword/account/{account_id}/trade-password/main", body: "request" };
  }
  // 修改观察密码
  rpc ChangeInvestorPassword(ChangeTradePasswordRequest) returns (OperationResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/tradepassword/account/{account_id}/trade-password/investor", body: "request" };
  }
  // 重置为初始密码
  rpc ResetToInitialPassword(ResetToInitialPasswordRequest) returns (OperationResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/tradepassword/account/{account_id}/trade-password/reset-to-initial", body: "request" };
  }
  // 获取密码修改历史
  rpc GetPasswordHistory(GetPasswordHistoryRequest) returns (PasswordHistoryResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradepassword/account/{account_id}/trade-password/history" };
  }
}

// ─── Tenant Trade Service Configuration (api/v1/tenant/tradeserviceconfiguration) ──

service TenantTradeServiceConfigurationService {
  // 获取服务配置
  rpc GetConfiguration(GetTradeServiceConfigRequest) returns (TradeServiceConfigResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/configuration" };
  }
  // 获取 MT5 模拟账户前缀
  rpc GetAccountPrefixes(GetTradeServiceConfigRequest) returns (AccountPrefixesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/account-prefixes" };
  }
  // 更新 MT5 模拟账户前缀
  rpc UpdateAccountPrefixes(UpdateAccountPrefixesRequest) returns (AccountPrefixesResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/account-prefixes", body: "prefixes" };
  }
}

// ─── Client Trade Account API (api/v1/client/trade-account) ──────────────────

service ClientTradeAccountService {
  // 列表查询
  rpc ListTradeAccounts(ListTradeAccountsRequest) returns (ListTradeAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account" };
  }
  // 获取单条
  rpc GetTradeAccount(GetTradeAccountRequest) returns (TradeAccount) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}" };
  }
  // 校验目标邮箱
  rpc CheckTargetEmail(CheckTargetEmailRequest) returns (CheckTargetEmailResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/check-target-email" };
  }
  // 获取批发推荐检查
  rpc WholesaleReferralCheck(WholesaleReferralCheckRequest) returns (WholesaleReferralCheckResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/wholesale-referral-check" };
  }
  // 获取交易记录列表
  rpc ListTrades(GetTradeAccountTradesRequest) returns (ListTradesResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}/trade" };
  }
  // 请求修改密码 OTP
  rpc RequestChangePasswordOtp(GetTradeAccountRequest) returns (OperationResponse) {
    option (google.api.http) = { post: "/api/v1/client/trade-account/{uid}/change-password" };
  }
  // 获取账户交易流水
  rpc ListTransactions(GetTradeAccountTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}/transaction" };
  }
}

// ─── Client Trade Account V2 API (api/v2/client/trade-account) ───────────────

service ClientTradeAccountServiceV2 {
  // 列表查询
  rpc ListTradeAccounts(ListTradeAccountsRequest) returns (ListTradeAccountsResponse) {
    option (google.api.http) = { get: "/api/v2/client/trade-account" };
  }
}

