// ─── Rep Trade Account API (api/v1/rep/{repUid}/trade-account) ───────────────
// Rep 账户下客户交易账户的查询接口。

service RepTradeAccountService {
  // 分页查询 Rep 旗下指定交易账户的交易记录
  rpc ListTrades(GetRepTradeAccountTradesRequest) returns (ListTradesResponse) {
