// ─── Messages ────────────────────────────────────────────────────────────────

message EmptyRequest {}

message OperationResponse {
  bool   success = 1;
  string message = 2;
}

// TradeAccount 实体
message TradeAccount {
  int64  id           = 1;
  int64  account_uid  = 2;   // 关联 Account id
  int64  login        = 3;   // MT4/MT5 login number
  int32  server_id    = 4;
  int32  leverage     = 5;
  double balance      = 6;
  double equity       = 7;
  double credit       = 8;
  int32  status       = 9;
  string created_at   = 10;
}

// TradeDemoAccount 实体
message TradeDemoAccount {
  int64  id          = 1;
  int64  account_uid = 2;
  int64  login       = 3;
  int32  server_id   = 4;
  int32  leverage    = 5;
  double balance     = 6;
  int32  status      = 7;
  string created_at  = 8;
}

// Trade（交易记录）实体
message Trade {
  int64  ticket       = 1;
  int64  login        = 2;
  string symbol       = 3;
  int32  cmd          = 4;   // 交易方向
  double volume       = 5;
  double open_price   = 6;
  double close_price  = 7;
  double profit       = 8;
  string open_time    = 9;
  string close_time   = 10;
}

// Transaction（账户流水）实体
message Transaction {
  int64  id          = 1;
  int64  account_uid = 2;
  double amount      = 3;
  string type        = 4;
  int32  status      = 5;
  string created_at  = 6;
}

// 列表请求/响应
message ListTradeAccountsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_uid = 2;
  optional int32    status      = 3;
  optional string   keywords    = 4;
  optional string   date_from   = 5;
  optional string   date_to     = 6;
}

message ListTradeAccountsResponse {
  repeated TradeAccount data = 1;
  PaginationMeta        meta = 2;
}

message GetTradeAccountRequest {
  int64 uid = 1;
}

message ListTradeDemoAccountsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_uid = 2;
  optional int32    status      = 3;
}

message ListTradeDemoAccountsResponse {
  repeated TradeDemoAccount data = 1;
  PaginationMeta            meta = 2;
}

message CreateTradeAccountRequest {
  int64  account_uid     = 1;
  int32  server_id       = 2;
  int32  leverage        = 3;
  string account_type    = 4;
  string currency        = 5;
}

message SetRebateRuleTemplateRequest {
  int64 id                       = 1;
  int64 rebate_rule_template_id  = 2;
}

message ReadOnlyCodeResponse {
  string code       = 1;
  string expires_at = 2;
}

message ReadOnlyCodeNoticeRequest {
  int64         id       = 1;
  string        to       = 2;
  repeated string bcc    = 3;
  string        language = 4;
}

message EmailPreviewResponse {
  string subject = 1;
  string body    = 2;
}

message UpdateLeverageRequest {
  int64 account_id = 1;
  int32 leverage   = 2;
}

// Trade list requests
message ListTradesRequest {
  PaginationRequest pagination      = 1;
  optional int64    trade_account_uid = 2;
  optional string   date_from       = 3;
  optional string   date_to         = 4;
  optional string   symbol          = 5;
}

message ListTradesResponse {
  repeated Trade data = 1;
  PaginationMeta meta = 2;
}

message GetTradeAccountTradesRequest {
  int64             uid        = 1;
  PaginationRequest pagination = 2;
  optional string   date_from  = 3;
  optional string   date_to    = 4;
}

message GetTradeAccountTransactionsRequest {
  int64             uid        = 1;
  PaginationRequest pagination = 2;
  optional string   date_from  = 3;
  optional string   date_to    = 4;
}

message ListTransactionsResponse {
  repeated Transaction data = 1;
  PaginationMeta       meta = 2;
}

// Trade Service messages
message GetServiceRequest {
  int32 id = 1;
}

message TradeServicesResponse {
  repeated TradeServiceItem items = 1;
}

message TradeServiceItem {
  int32  id   = 1;
  string name = 2;
  int32  type = 3;
}

message ServiceGroupsResponse {
  repeated string groups = 1;
}

message AddServiceGroupRequest {
  int32               id   = 1;
  ServiceGroupSpec    spec = 2;
}

message ServiceGroupSpec {
  string group = 1;
}

message DeleteServiceGroupRequest {
  int32            id   = 1;
  ServiceGroupSpec spec = 2;
}

message UpdateServiceGroupsRequest {
  int32                id   = 1;
  UpdateServiceGroupSpec spec = 2;
}

message UpdateServiceGroupSpec {
  repeated string groups = 1;
}

// Trade Password messages
message GetTradeAccountIdRequest {
  int64 account_id = 1;
}

message ResetCrmPasswordRequest {
  int64                    account_id = 1;
  ResetCrmPasswordByAdminSpec request  = 2;
}

message ResetCrmPasswordByAdminSpec {
  string new_password = 1;
}

message InitialPasswordResponse {
  string password = 1;
}

message ChangeTradePasswordRequest {
  int64                    account_id = 1;
  ChangeTradePasswordSpec  request    = 2;
}

message ChangeTradePasswordSpec {
  string old_password = 1;
  string new_password = 2;
}

message ResetToInitialPasswordRequest {
  int64                    account_id = 1;
  ResetToInitialSpec       request    = 2;
}

message ResetToInitialSpec {
  bool notify = 1;
}

message GetPasswordHistoryRequest {
  int64           account_id    = 1;
  optional string password_type = 2;
  int32           limit         = 3;
  int32           offset        = 4;
}

message PasswordHistoryResponse {
  repeated PasswordHistoryItem items = 1;
}

message PasswordHistoryItem {
  string type       = 1;
  string changed_at = 2;
  string changed_by = 3;
}

// Trade Service Configuration messages
message GetTradeServiceConfigRequest {
  int32 service_id = 1;
}

message TradeServiceConfigResponse {
  int32  service_id = 1;
  string server     = 2;
  int32  type       = 3;
}

message AccountPrefixesResponse {
  map<string, int64> prefixes = 1;
}

message UpdateAccountPrefixesRequest {
  int32              service_id = 1;
  map<string, int64> prefixes   = 2;
}

// Client specific messages
message CheckTargetEmailRequest {
  string email = 1;
}

message CheckTargetEmailResponse {
  bool   exists     = 1;
  int64  wallet_uid = 2;
}

message WholesaleReferralCheckRequest {
  string email   = 1;
  string ref_code = 2;
}

message WholesaleReferralCheckResponse {
  bool   trade_account_exists = 1;
  bool   email_exists         = 2;
}

message CreateTradeDemoAccountRequest {
  string account_type    = 1;
  double initial_deposit = 2;
  int32  leverage        = 3;
}

// IB area messages
message ListIbTradeAccountsRequest {
  int64             agent_uid  = 1;
  PaginationRequest pagination = 2;
  optional int64    account_uid = 3;
  optional int32    status     = 4;
}

message GetIbTradeAccountRequest {
  int64 agent_uid = 1;
  int64 uid       = 2;
}

message GetIbTradeAccountTradesRequest {
  int64             agent_uid  = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

message GetIbTradeAccountTransactionsRequest {
  int64             agent_uid  = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

// Sales area messages
message ListSalesTradeAccountsRequest {
  int64             sales_uid  = 1;
  PaginationRequest pagination = 2;
  optional int64    account_uid = 3;
  optional int32    status     = 4;
}

message GetSalesTradeAccountRequest {
  int64 sales_uid = 1;
  int64 uid       = 2;
}

message GetSalesTradeAccountTradesRequest {
  int64             sales_uid  = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

message GetSalesTradeAccountTransactionsRequest {
  int64             sales_uid  = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

// Rep area messages
message GetRepTradeAccountTradesRequest {
  int64             rep_uid    = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}

message GetRepTradeAccountTransactionsRequest {
  int64             rep_uid    = 1;
  int64             uid        = 2;
  PaginationRequest pagination = 3;
  optional string   date_from  = 4;
  optional string   date_to    = 5;
}
