// ─── Messages ────────────────────────────────────────────────────────────────

// 交易账户实体（真实账户）
message TradeAccount {
  int64  id          = 1; // 交易账户记录 ID
  int64  account_uid = 2; // 关联的 Account ID（portal 账户）
  int64  login       = 3; // MT4/MT5 登录账号（在 MT 服务器上的唯一 ID）
  int32  server_id   = 4; // MT 服务器 ID（对应 TradeServiceItem.id）
  int32  leverage    = 5; // 杠杆倍数，如 100、200、500
  double balance     = 6; // 账户余额（基础货币）
  double equity      = 7; // 账户净值（余额 + 浮动盈亏）
  double credit      = 8; // 信用额度（bonus 类资金）
  int32  status      = 9; // 账户状态：0=inactive、1=active、2=suspended、3=closed
  string created_at  = 10; // 创建时间，ISO 8601 格式
}

// 模拟交易账户实体
message TradeDemoAccount {
  int64  id          = 1; // 模拟账户记录 ID
  int64  account_uid = 2; // 关联的 Account ID
  int64  login       = 3; // MT4/MT5 模拟账号
  int32  server_id   = 4; // MT 服务器 ID
  int32  leverage    = 5; // 杠杆倍数
  double balance     = 6; // 模拟账户余额（虚拟资金）
  int32  status      = 7; // 状态：0=inactive、1=active
  string created_at  = 8; // 创建时间，ISO 8601 格式
}

// 交易记录实体（MT4/MT5 历史订单）
message Trade {
  int64  ticket      = 1; // MT4/MT5 订单号（唯一标识）
  int64  login       = 2; // 交易账号（MT4/MT5 login）
  string symbol      = 3; // 交易品种，如 "EURUSD"、"XAUUSD"
  int32  cmd         = 4; // 交易方向：0=buy、1=sell、2=buy limit 等（MT4 cmd 枚举）
  double volume      = 5; // 交易手数（lot）
  double open_price  = 6; // 开仓价格
  double close_price = 7; // 平仓价格（未平仓时为 0）
  double profit      = 8; // 盈亏（已实现，基础货币）
  string open_time   = 9; // 开仓时间，ISO 8601 格式
  string close_time  = 10; // 平仓时间，ISO 8601 格式（未平仓时为空）
}

// 资金流水实体（账户层面的存取款/调整记录）
message Transaction {
  int64  id          = 1; // 流水 ID
  int64  account_uid = 2; // 关联账户 ID
  double amount      = 3; // 金额（正=收入，负=支出）
  string type        = 4; // 流水类型字符串，如 "deposit"、"withdrawal"、"rebate"
  int32  status      = 5; // 状态：0=pending、1=completed、2=cancelled
  string created_at  = 6; // 创建时间，ISO 8601 格式
}

// ─── 列表请求/响应 ─────────────────────────────────────────────────────────────

// 交易账户列表查询（通用）
message ListTradeAccountsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_uid = 2; // 按关联账户 ID 过滤
  optional int32    status      = 3; // 按账户状态过滤
  optional string   keywords    = 4; // 按 login 账号或名称关键字搜索
  optional string   date_from   = 5; // ISO 8601 格式
  optional string   date_to     = 6; // ISO 8601 格式
}

message ListTradeAccountsResponse {
  repeated TradeAccount data = 1;
  PaginationMeta        meta = 2;
}

// 按 uid 查询交易账户
message GetTradeAccountRequest {
  int64 uid = 1; // 交易账户 uid（TradeAccount.id）
}

// 模拟账户列表查询
message ListTradeDemoAccountsRequest {
  PaginationRequest pagination  = 1;
  optional int64    account_uid = 2;
  optional int32    status      = 3;
}

message ListTradeDemoAccountsResponse {
  repeated TradeDemoAccount data = 1;
  PaginationMeta            meta = 2;
}

// 创建交易账户请求
message CreateTradeAccountRequest {
  int64  account_uid  = 1; // 关联的 portal 账户 ID
  int32  server_id    = 2; // MT 服务器 ID
  int32  leverage     = 3; // 初始杠杆倍数
  string account_type = 4; // 账户类型字符串，如 "Standard"、"ECN"
  string currency     = 5; // 基础货币代码，如 "USD"、"AUD"
}

// 设置返佣规则模板请求
message SetRebateRuleTemplateRequest {
  int64 id                      = 1; // 交易账户 ID
  int64 rebate_rule_template_id = 2; // 返佣规则模板 ID
}

// 只读密码响应
message ReadOnlyCodeResponse {
  string code       = 1; // 只读密码（MT4/MT5 观察密码）
  string expires_at = 2; // 过期时间，ISO 8601 格式
}

// 只读密码通知邮件请求
message ReadOnlyCodeNoticeRequest {
  int64           id       = 1; // 交易账户 ID
  string          to       = 2; // 收件人邮箱
  repeated string bcc      = 3; // 密送邮箱列表
  string          language = 4; // 邮件语言，如 "en"
}

// 邮件预览响应
message EmailPreviewResponse {
  string subject = 1; // 邮件主题
  string body    = 2; // 邮件 HTML 正文
}

// 更新杠杆请求
message UpdateLeverageRequest {
  int64 account_id = 1; // 交易账户 ID
  int32 leverage   = 2; // 新杠杆倍数
}

// ─── 交易记录相关 ──────────────────────────────────────────────────────────────

// 交易记录列表查询（通用，后台使用）
message ListTradesRequest {
  PaginationRequest pagination        = 1;
  optional int64    trade_account_uid = 2; // 按交易账户 ID 过滤
  optional string   date_from         = 3; // ISO 8601 格式
  optional string   date_to           = 4; // ISO 8601 格式
  optional string   symbol            = 5; // 按品种名称过滤，如 "EURUSD"
}

message ListTradesResponse {
  repeated Trade data = 1;
  PaginationMeta meta = 2;
}

// 查询指定交易账户的交易记录（客户端）
message GetTradeAccountTradesRequest {
  int64             uid        = 1; // 交易账户 uid
  PaginationRequest pagination = 2;
  optional string   date_from  = 3; // ISO 8601 格式
  optional string   date_to    = 4; // ISO 8601 格式
}

// 查询指定交易账户的资金流水（客户端）
message GetTradeAccountTransactionsRequest {
  int64             uid        = 1;
  PaginationRequest pagination = 2;
  optional string   date_from  = 3; // ISO 8601 格式
  optional string   date_to    = 4; // ISO 8601 格式
}

message ListTradeTransactionsResponse {
  repeated Transaction data = 1;
  PaginationMeta       meta = 2;
}

// ─── MT 服务相关 ───────────────────────────────────────────────────────────────

// 按 id 查询服务
message GetServiceRequest {
  int32 id = 1;
}

// MT 交易服务列表响应
message TradeServicesResponse {
  repeated TradeServiceItem items = 1;
}

// MT 交易服务实体
message TradeServiceItem {
  int32  id   = 1; // 服务 ID
  string name = 2; // 服务名称，如 "MT5 Live"
  int32  type = 3; // 服务类型：1=MT4、2=MT5
}

// MT 账户分组列表响应
message ServiceGroupsResponse {
  repeated string groups = 1; // MT 账户分组名称列表，如 ["Standard", "ECN", "VIP"]
}

// 添加服务分组请求
message AddServiceGroupRequest {
  int32            id   = 1;
  ServiceGroupSpec spec = 2;
}

// 分组名称规格
message ServiceGroupSpec {
  string group = 1; // MT 账户分组名称
}

// 删除服务分组请求
message DeleteServiceGroupRequest {
  int32            id   = 1;
  ServiceGroupSpec spec = 2;
}

// 批量更新服务分组请求
message UpdateServiceGroupsRequest {
  int32                  id   = 1;
  UpdateServiceGroupSpec spec = 2;
}

// 批量分组规格
message UpdateServiceGroupSpec {
  repeated string groups = 1; // 新的完整分组列表（全量替换）
}

// ─── 密码管理相关 ──────────────────────────────────────────────────────────────

// 按 account_id 查询（密码管理接口使用）
message GetTradeAccountIdRequest {
  int64 account_id = 1; // 交易账户 ID
}

// CRM 管理员重置密码请求
message ResetCrmPasswordRequest {
  int64                       account_id = 1;
  ResetCrmPasswordByAdminSpec request    = 2;
}

// CRM 重置密码规格
message ResetCrmPasswordByAdminSpec {
  string new_password = 1; // 新密码（明文）
}

// 初始密码响应
message InitialPasswordResponse {
  string password = 1; // 系统生成的初始密码（明文）
}

// 修改交易密码请求
message ChangeTradePasswordRequest {
  int64                   account_id = 1;
  ChangeTradePasswordSpec request    = 2;
}

// 修改密码规格
message ChangeTradePasswordSpec {
  string old_password = 1; // 旧密码（验证用）
  string new_password = 2; // 新密码
}

// 重置为初始密码请求
message ResetToInitialPasswordRequest {
  int64              account_id = 1;
  ResetToInitialSpec request    = 2;
}

// 重置到初始密码规格
message ResetToInitialSpec {
  bool notify = 1; // true 时向用户发送密码重置通知邮件
}

// 查询密码修改历史请求
message GetPasswordHistoryRequest {
  int64           account_id    = 1;
  optional string password_type = 2; // "main" 或 "investor"；不传则返回所有类型
  int32           limit         = 3; // 返回条数上限
  int32           offset        = 4; // 分页偏移量
}

// 密码修改历史响应
message PasswordHistoryResponse {
  repeated PasswordHistoryItem items = 1;
}

// 密码修改历史条目
message PasswordHistoryItem {
  string type       = 1; // 密码类型："main" 或 "investor"
  string changed_at = 2; // 修改时间，ISO 8601 格式
  string changed_by = 3; // 操作人标识（管理员邮箱或系统）
}

// ─── 服务配置相关 ──────────────────────────────────────────────────────────────

// 按 service_id 查询服务配置
message GetTradeServiceConfigRequest {
  int32 service_id = 1;
}

// MT 服务配置响应
message TradeServiceConfigResponse {
  int32  service_id = 1;
  string server     = 2; // MT 服务器连接地址，如 "mt5.example.com:443"
  int32  type       = 3; // 服务类型：1=MT4、2=MT5
}

// MT5 模拟账户前缀映射响应
message AccountPrefixesResponse {
  map<string, int64> prefixes = 1; // key=前缀字符串，value=该前缀的账号起始值
}

// 更新账户前缀请求
message UpdateAccountPrefixesRequest {
  int32              service_id = 1;
  map<string, int64> prefixes   = 2;
}

// ─── 客户端特有消息 ────────────────────────────────────────────────────────────

// 检查目标邮箱请求
message CheckTargetEmailRequest {
  string email = 1;
}

// 检查目标邮箱响应
message CheckTargetEmailResponse {
  bool   exists     = 1; // true 表示该邮箱已注册
  int64  wallet_uid = 2; // 对应的钱包 UID（若存在）
}

// 批发推荐资格检查请求
message WholesaleReferralCheckRequest {
  string email    = 1;
  string ref_code = 2; // 推荐码
}

// 批发推荐资格检查响应
message WholesaleReferralCheckResponse {
  bool trade_account_exists = 1; // 该邮箱是否已有交易账户
  bool email_exists         = 2; // 该邮箱是否已注册
}

// 创建模拟账户请求（客户端）
message CreateTradeDemoAccountRequest {
  string account_type    = 1; // 账户类型，如 "Standard"
  double initial_deposit = 2; // 初始模拟存款金额（虚拟资金）
  int32  leverage        = 3; // 杠杆倍数
}

