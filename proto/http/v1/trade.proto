syntax = "proto3";

package http.v1;

option csharp_namespace = "Http.V1";
option go_package = "proto/http/v1;httpv1";

import "google/api/annotations.proto";
import "http/v1/common.proto";

// ─── Tenant Trade Account API (api/v1/tenant/trade-account) ─────────────────
// 管理真实交易账户（TradeAccount）的完整生命周期。
// 交易账户是 MT4/MT5 账户，通过 login 字段（MT4/MT5 账号）与 MT 服务器通信。

service TenantTradeAccountService {
  // 分页查询交易账户列表；可按 account_uid、status、关键字及日期范围过滤
  rpc ListTradeAccounts(TenantTradeAccountServiceListTradeAccountsRequest) returns (TenantTradeAccountServiceListTradeAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account" };
  }
  // 按 uid 获取交易账户详情（含余额、净值、信用额）
  rpc GetTradeAccount(TenantTradeAccountServiceGetTradeAccountRequest) returns (TenantTradeAccountServiceGetTradeAccountResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account/{uid}" };
  }
  // 在 MT 服务器上创建新交易账户（触发异步开户流程）
  rpc CreateTradeAccount(CreateTradeAccountRequest) returns (CreateTradeAccountResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account", body: "*" };
  }
  // 为交易账户设置返佣规则模板（rebate_rule_template_id 为路径参数）
  rpc SetRebateRuleTemplate(SetRebateRuleTemplateRequest) returns (SetRebateRuleTemplateResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{id}/template/{rebate_rule_template_id}" };
  }
  // 获取交易账户的只读密码（MT4/MT5 观察密码，含过期时间）
  rpc GetReadOnlyCode(GetReadOnlyCodeRequest) returns (GetReadOnlyCodeResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-account/{uid}/read-only-code" };
  }
  // 预览只读密码通知邮件内容（不发送，返回 subject 和 HTML body）
  rpc PreviewReadOnlyCodeNotice(PreviewReadOnlyCodeNoticeRequest) returns (PreviewReadOnlyCodeNoticeResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account/{id}/read-only-code/notice/preview" };
  }
  // 向指定邮箱发送只读密码通知邮件（支持 bcc）
  rpc SendReadOnlyCodeNotice(SendReadOnlyCodeNoticeRequest) returns (SendReadOnlyCodeNoticeResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade-account/{id}/read-only-code/notice" };
  }
  // 更新交易账户杠杆倍数（leverage 为路径参数）
  rpc UpdateLeverage(UpdateLeverageRequest) returns (UpdateLeverageResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{account_id}/leverage/{leverage}" };
  }
  // 从 MT 服务器同步并刷新账户余额/净值数据
  rpc CheckBalance(CheckBalanceRequest) returns (CheckBalanceResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/trade-account/{uid}/check-balance" };
  }
}

// ─── Tenant Trade Demo Account API (api/v1/tenant/trade-demo-account) ────────
// 管理模拟交易账户（TradeDemoAccount）。

service TenantTradeDemoAccountService {
  // 分页查询模拟交易账户列表；可按 account_uid、status 过滤
  rpc ListTradeDemoAccounts(TenantTradeDemoAccountServiceListTradeDemoAccountsRequest) returns (TenantTradeDemoAccountServiceListTradeDemoAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade-demo-account" };
  }
  // 删除模拟交易账户（uid 为路径参数，操作不可恢复）
  rpc DeleteTradeDemoAccount(DeleteTradeDemoAccountRequest) returns (DeleteTradeDemoAccountResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/trade-demo-account/{uid}" };
  }
}

// ─── Tenant Trade API (api/v1/tenant/trade) ──────────────────────────────────
// 查询交易记录及管理 MT 服务分组配置。

service TenantTradeService {
  // 分页查询交易记录；可按 trade_account_uid、品种、日期范围过滤
  rpc ListTrades(ListTradesRequest) returns (TenantTradeServiceListTradesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade" };
  }
  // 获取所有 MT 交易服务列表（含 id、name、type）
  rpc ListServices(TenantTradeServiceListServicesRequest) returns (TenantTradeServiceListServicesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade/service" };
  }
  // 获取指定服务的 MT 账户分组列表（group 名称字符串数组）
  rpc GetServiceGroups(GetServiceGroupsRequest) returns (GetServiceGroupsResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/trade/service/{id}/group" };
  }
  // 向服务的分组列表添加一个新分组名称（body 字段名为 spec）
  rpc AddServiceGroup(AddServiceGroupRequest) returns (AddServiceGroupResponse) {
    option (google.api.http) = { post: "/api/v1/tenant/trade/service/{id}/group", body: "spec" };
  }
  // 从服务的分组列表删除一个分组（body 字段名为 spec，含 group 名称）
  rpc DeleteServiceGroup(DeleteServiceGroupRequest) returns (DeleteServiceGroupResponse) {
    option (google.api.http) = { delete: "/api/v1/tenant/trade/service/{id}/group" };
  }
  // 全量替换服务的分组列表（body 字段名为 spec）
  rpc UpdateServiceGroups(UpdateServiceGroupsRequest) returns (UpdateServiceGroupsResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/trade/service/{id}/group", body: "spec" };
  }
}

// ─── Tenant Trade Password API (api/v1/tenant/tradepassword) ─────────────────
// 管理 MT4/MT5 交易密码：重置、修改、查看初始密码及历史。

// HTTP 路由全部由 MVC TradePasswordController 处理，gRPC 仅保留内部调用定义
service TenantTradePasswordService {
  rpc ResetCrmPassword(ResetCrmPasswordRequest) returns (ResetCrmPasswordResponse) {}
  rpc GetInitialTradePassword(GetInitialTradePasswordRequest) returns (GetInitialTradePasswordResponse) {}
  rpc ChangeMainPassword(ChangeMainPasswordRequest) returns (ChangeMainPasswordResponse) {}
  rpc ChangeInvestorPassword(ChangeInvestorPasswordRequest) returns (ChangeInvestorPasswordResponse) {}
  rpc ResetToInitialPassword(ResetToInitialPasswordRequest) returns (ResetToInitialPasswordResponse) {}
  rpc GetPasswordHistory(GetPasswordHistoryRequest) returns (GetPasswordHistoryResponse) {}
}

// ─── Tenant Trade Service Configuration (api/v1/tenant/tradeserviceconfiguration) ──
// 管理 MT 服务配置，包括服务信息和 MT5 模拟账户前缀映射。

service TenantTradeServiceConfigurationService {
  // 获取指定服务（by service_id）的配置信息（server 地址、type）
  rpc GetConfiguration(GetConfigurationRequest) returns (GetConfigurationResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/configuration" };
  }
  // 获取 MT5 模拟账户前缀映射（key=前缀字符串，value=起始账号数字）
  rpc GetAccountPrefixes(GetAccountPrefixesRequest) returns (GetAccountPrefixesResponse) {
    option (google.api.http) = { get: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/account-prefixes" };
  }
  // 更新 MT5 模拟账户前缀映射（body 字段名为 prefixes）
  rpc UpdateAccountPrefixes(UpdateAccountPrefixesRequest) returns (UpdateAccountPrefixesResponse) {
    option (google.api.http) = { put: "/api/v1/tenant/tradeserviceconfiguration/{service_id}/account-prefixes", body: "*" };
  }
}

// ─── Client Trade Account API (api/v1/client/trade-account) ──────────────────
// 客户端查看和管理自身交易账户的接口。

service ClientTradeAccountService {
  // 分页查询当前用户的交易账户列表
  rpc ListTradeAccounts(ClientTradeAccountServiceListTradeAccountsRequest) returns (ClientTradeAccountServiceListTradeAccountsResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account" };
  }
  // 按 uid 获取交易账户详情
  rpc GetTradeAccount(ClientTradeAccountServiceGetTradeAccountRequest) returns (ClientTradeAccountServiceGetTradeAccountResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}" };
  }
  // 检查目标邮箱是否存在，及对应的钱包 UID（转账前验证用）
  rpc CheckTargetEmail(CheckTargetEmailRequest) returns (CheckTargetEmailResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/check-target-email" };
  }
  // 批发推荐资格检查（验证邮箱和推荐码是否满足批发开户条件）
  rpc WholesaleReferralCheck(WholesaleReferralCheckRequest) returns (WholesaleReferralCheckResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/wholesale-referral-check" };
  }
  // 分页查询指定交易账户的交易记录；可按日期范围过滤
  rpc ListTrades(ClientTradeAccountServiceListTradesRequest) returns (ClientTradeAccountServiceListTradesResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}/trade" };
  }
  // 触发修改密码 OTP 发送（发送验证码到用户邮箱，后续用于密码修改）
  rpc RequestChangePasswordOtp(RequestChangePasswordOtpRequest) returns (RequestChangePasswordOtpResponse) {
    option (google.api.http) = { post: "/api/v1/client/trade-account/{uid}/change-password" };
  }
  // 分页查询指定交易账户的资金流水（充提款/调整等）
  rpc ListTransactions(ClientTradeAccountServiceListTransactionsRequest) returns (ClientTradeAccountServiceListTransactionsResponse) {
    option (google.api.http) = { get: "/api/v1/client/trade-account/{uid}/transaction" };
  }
}

