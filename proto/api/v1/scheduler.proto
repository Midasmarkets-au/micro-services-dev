syntax = "proto3";

package api.v1;

option csharp_namespace = "Api.V1";
option go_package = "api/v1";

// SchedulerService — exposed by the Rust scheduler service.
// mono calls this to enqueue report jobs and trigger cron jobs.
service SchedulerService {
  // Enqueue a ProcessReportRequest job (replaces Hangfire.Enqueue<IReportJob>).
  rpc EnqueueReportRequest(EnqueueReportRequestRequest) returns (EnqueueReportRequestResponse);

  // Manually trigger the close-trade cron job.
  rpc TriggerCloseTrade(TriggerCloseTradeRequest) returns (TriggerCloseTradeResponse);

  // Manually trigger the account-daily-confirmation cron job.
  rpc TriggerAccountDaily(TriggerAccountDailyRequest) returns (TriggerAccountDailyResponse);
}

// MonoCallbackService — exposed by mono.
// The Rust scheduler calls this after a report is generated,
// so mono can send the WebSocket popup notification to the client.
// Also called by the Rust scheduler to trigger recurring jobs managed by Hangfire.
service MonoCallbackService {
  rpc NotifyReportDone(NotifyReportDoneRequest) returns (NotifyReportDoneResponse);

  // Trigger recurring jobs (cron schedule managed by Rust scheduler).
  rpc TriggerCalculateRebate(TriggerCalculateRebateRequest) returns (TriggerCalculateRebateResponse);
  rpc TriggerReleaseRebate(TriggerReleaseRebateRequest) returns (TriggerReleaseRebateResponse);
  rpc TriggerCryptoMonitor(TriggerCryptoMonitorRequest) returns (TriggerCryptoMonitorResponse);
}

message EnqueueReportRequestRequest {
  int64 tenant_id  = 1;
  int64 request_id = 2;
}

message EnqueueReportRequestResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerCloseTradeRequest {
  int64 tenant_id = 1;
}

message TriggerCloseTradeResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerAccountDailyRequest {
  int64 tenant_id = 1;
}

message TriggerAccountDailyResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerCalculateRebateRequest {
  int64 tenant_id = 1;
}

message TriggerCalculateRebateResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerReleaseRebateRequest {
  int64 tenant_id = 1;
}

message TriggerReleaseRebateResponse {
  bool   success = 1;
  string message = 2;
}

message TriggerCryptoMonitorRequest {
  int64 tenant_id = 1;
}

message TriggerCryptoMonitorResponse {
  bool   success = 1;
  string message = 2;
}

message NotifyReportDoneRequest {
  int64  tenant_id   = 1;
  int64  party_id    = 2;
  string report_name = 3;
}

message NotifyReportDoneResponse {
  bool success = 1;
}
