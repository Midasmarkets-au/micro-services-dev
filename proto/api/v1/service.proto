syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";


option csharp_namespace = "Api.V1";
option go_package = "api/v1";

// ApiService 提供 gRPC 与 HTTP (gRPC-Web) 接口
service ApiService {
  // 简单问候
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse){
    option (google.api.http) = {
      get: "/api/v1/hello"
    };
  }
  // 健康检查
  rpc Check(CheckRequest) returns (CheckResponse){
    option (google.api.http) = {
      get: "/api/v1/health"
    };
  }
  // SnowFlakeID generate 
  rpc GenerateID(GenerateIDRequest) returns (GenerateIDResponse){
    option (google.api.http) = {
      get: "/api/v1/generateid"
    };
  }
}

// Hello 请求
message SayHelloRequest {
  string name = 1;
}

// Hello 响应
message SayHelloResponse {
  string message = 1;
}

// 健康检查请求
message CheckRequest {}

// 健康检查响应
message CheckResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SERVING = 1;
    STATUS_NOT_SERVING = 2;
  }
  Status status = 1;
}

// GenerateID 请求
message GenerateIDRequest {
  uint32 work_id = 1;
}

// GenerateID 响应
message GenerateIDResponse {
  uint64 id = 1;
}
