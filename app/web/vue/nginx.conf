server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /images/ /apk/ /audios/ to S3
    location ^~ /images/ {
        proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/images/;
        proxy_ssl_server_name on;
        proxy_set_header Host mm-front-public.s3.ap-southeast-2.amazonaws.com;
    }

    location ^~ /apk/ {
        proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/apk/;
        proxy_ssl_server_name on;
        proxy_set_header Host mm-front-public.s3.ap-southeast-2.amazonaws.com;
    }

    location ^~ /audios/ {
        proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/audios/;
        proxy_ssl_server_name on;
        proxy_set_header Host mm-front-public.s3.ap-southeast-2.amazonaws.com;
    }

    # Webpack-emitted fonts have a content hash (e.g. fa-regular-400.561c7c94.woff2) — serve locally
    location ~* ^/fonts/.+\.[a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9][a-f0-9]\.(woff2|woff|ttf|eot|svg)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Non-hashed fonts (e.g. Lato-Regular.ttf) — proxy to S3
    location ^~ /fonts/ {
        proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/fonts/;
        proxy_ssl_server_name on;
        proxy_set_header Host mm-front-public.s3.ap-southeast-2.amazonaws.com;
    }

    location ^~ /fonticon/ {
        proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/fonticon/;
        proxy_ssl_server_name on;
        proxy_set_header Host mm-front-public.s3.ap-southeast-2.amazonaws.com;
    }

    # SPA fallback: all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
