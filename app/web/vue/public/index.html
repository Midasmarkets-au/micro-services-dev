  <style>
    /* HTML: <div class="loader"></div> */
    .bg-loading-style {
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0) 0%,
        rgba(193, 214, 250, 0.8) 100%
      );
    }
    .loader {
      width: fit-content;
      font-size: 48px;
      font-weight: bold;
      text-transform: uppercase;
      color: #0000;
      -webkit-text-stroke: 1px #000;
      background: conic-gradient(#800020 0 0) 0/0% 100% no-repeat text;
      animation: l1 1s linear infinite;
    }
    .loader:before {
      content: "MDM...";
    }
    @keyframes l1 {
      to {
        background-size: 120% 100%;
      }
    }
