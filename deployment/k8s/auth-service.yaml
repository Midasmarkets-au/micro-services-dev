# ============================================================================
#  auth Service — ClusterIP，由 NGINX Ingress 暴露 /connect/token
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app: auth
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    app: auth
