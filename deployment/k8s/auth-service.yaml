# ============================================================================
#  auth Service — ClusterIP
#  9002: HTTP（/connect/token, /api/v2/auth/*, /.well-known/jwks.json）
#  50002: gRPC（AuthValidationService，供 mono 调用 ValidateToken）
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app: auth
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9002
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50002
      targetPort: grpc
      protocol: TCP
  selector:
    app: auth
