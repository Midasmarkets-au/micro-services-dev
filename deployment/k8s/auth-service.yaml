# ============================================================================
#  auth Service — ClusterIP
#  9001: HTTP（/connect/token, /api/v2/auth/*, /.well-known/jwks.json）
#  50006: gRPC（AuthValidationService，供 mono 调用 ValidateToken）
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app: auth
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9001
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50006
      targetPort: grpc
      protocol: TCP
  selector:
    app: auth
