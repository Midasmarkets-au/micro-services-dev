# ============================================================================
#  boardcast Service — ClusterIP
#  供 mono 通过 http://boardcast:50003 调用 gRPC
#  同时暴露 9003 供 SSE 订阅（可通过 Ingress 对外）
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: boardcast
  labels:
    app: boardcast
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9003
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50003
      targetPort: grpc
      protocol: TCP
  selector:
    app: boardcast
