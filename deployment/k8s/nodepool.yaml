apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-arm
spec:
  template:
    spec:
      # --- ADD THIS BLOCK ---
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      # ----------------------
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
  disruption:
    consolidationPolicy: WhenEmpty   # Only reclaim fully empty nodes, prevents pod eviction for consolidation
    consolidateAfter: 1h
    budgets:
      - nodes: 10%
  weight: 10

