# ============================================================================
#  NATS JetStream — 持久化消息队列
#  端口：4222 (client)
#  JetStream 数据持久化到 emptyDir（重启后丢失，如需持久化请改为 PVC）
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - -js                         # 启用 JetStream
            - --store_dir=/data           # JetStream 数据目录
            - -m
            - "8222"                      # 开启 HTTP 监控接口
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  labels:
    app: nats
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: 8222
      protocol: TCP
  selector:
    app: nats
