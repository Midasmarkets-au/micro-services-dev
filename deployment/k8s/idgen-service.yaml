# ============================================================================
#  idgen Service — ClusterIP，供 mono 通过 http://idgen:50001 调用 gRPC
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: idgen
  labels:
    app: idgen
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50001
      targetPort: grpc
      protocol: TCP
  selector:
    app: idgen
