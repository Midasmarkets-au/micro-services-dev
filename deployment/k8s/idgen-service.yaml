# ============================================================================
#  idgen Service — ClusterIP，供 mono 通过 http://idgen:50051 调用 gRPC
#  同时暴露 8080 供内部 HTTP 调用或调试
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: idgen
  labels:
    app: idgen
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  selector:
    app: idgen
