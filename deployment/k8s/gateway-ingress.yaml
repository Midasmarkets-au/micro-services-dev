# ============================================================================
#  NGINX Ingress Controller
#
#  前置条件：
#    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/aws/deploy.yaml
#
#  包含两个 Ingress 对象：
#    1. bacera-ingress          — 主路由（mono / front-*）
#    2. boardcast-event-ingress — SSE 路由，将 /api/v1/event 重写为 /event
#
#  流量路径：
#    portal.trademdm.com/api/v1/event               → boardcast:9003/event（rewrite）
#    portal.trademdm.com/connect/                   → auth:9002（Rust auth 服务）
#    portal.trademdm.com/api/v2/auth/               → auth:9002（Rust auth 服务）
#    portal.trademdm.com/.well-known/jwks.json      → auth:9002（JWKS 公钥端点）
#    portal.trademdm.com/(api|hub|live|...)         → mono:9005
#    portal.trademdm.com/                           → front-client:80
#    tenant.trademdm.com/connect/                   → auth:9002
#    tenant.trademdm.com/api/v2/auth/               → auth:9002
#    tenant.trademdm.com/(api|hub|live|...)         → mono:9005
#    tenant.trademdm.com/                           → front-tenant:80
#
#  注意：portal 的 /api/ 路径使用负向前瞻排除 /api/v1/event，
#  避免与 boardcast-event-ingress 冲突。
#  nginx ingress controller 合并同一 host 的所有 Ingress 后按字母顺序排列
#  location 块，bacera-ingress 的 /api/ 正则会先于 /api/v1/event 匹配。
# ============================================================================
---
# ============================================================================
#  ingress-nginx-controller Service — AWS NLB + ACM TLS 终止
#  绑定 3 个 ACM 证书（覆盖多域名 SAN）
#  应用：kubectl apply -f deployment/k8s/gateway-ingress.yaml
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/version: 1.10.0
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: >-
      arn:aws:acm:ap-southeast-2:961341529237:certificate/ae1bbd76-96d9-44e2-94fe-7dcb21c63398,arn:aws:acm:ap-southeast-2:961341529237:certificate/6c577a74-880c-4793-b8c2-c02b3a3df445,arn:aws:acm:ap-southeast-2:961341529237:certificate/5f466aa8-07ae-430e-8c7d-ab59929f6ccc
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
      appProtocol: http
    - name: https
      port: 443
      protocol: TCP
      targetPort: http
      appProtocol: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bacera-ingress
  labels:
    app: bacera
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # WebSocket upgrade headers（SignalR /hub/ /live/）
    nginx.ingress.kubernetes.io/proxy-set-headers: "ingress-nginx/custom-headers"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # 增大响应头缓冲区，防止 Next.js Server Action 设置大 Cookie（refresh_token）时触发 502
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: portal.trademdm.com
      http:
        paths:
          # Rust auth 服务：token 端点、auth API、JWKS 公钥
          - path: /connect/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v2/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /\.well-known/
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v1/2fa/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          # register 保留在 mono（需在 /api/v1/auth/ 通配规则之前）
          - path: /api/v1/auth/register
            pathType: Prefix
            backend:
              service:
                name: mono
                port:
                  number: 9005
          # V1 auth 整体打到 auth Rust 服务
          - path: /api/v1/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          # 负向前瞻排除 /api/v1/event、/api/v1/auth、/api/v2/auth，分别由各自 ingress/auth 处理
          - path: /(?!api/v1/event(/|$))(?!api/v1/auth(/|$))(?!api/v2/auth(/|$))(api|hub|live|swagger|.well-known/openid-configuration)/
            pathType: ImplementationSpecific
            backend:
              service:
                name: mono
                port:
                  number: 9005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-client
                port:
                  number: 80
    - host: tenant.trademdm.com
      http:
        paths:
          # Rust auth 服务
          - path: /connect/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v2/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /\.well-known/
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v1/2fa/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          # register 保留在 mono
          - path: /api/v1/auth/register
            pathType: Prefix
            backend:
              service:
                name: mono
                port:
                  number: 9005
          # V1 auth 整体打到 auth Rust 服务
          - path: /api/v1/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /(?!api/v1/auth(/|$))(?!api/v2/auth(/|$))(api|hub|live|swagger)/
            pathType: ImplementationSpecific
            backend:
              service:
                name: mono
                port:
                  number: 9005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-tenant
                port:
                  number: 80
    - http:
        paths:
          # Rust auth 服务（通配 host）
          - path: /connect/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v2/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /\.well-known/
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /api/v1/2fa/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          # register 保留在 mono
          - path: /api/v1/auth/register
            pathType: Prefix
            backend:
              service:
                name: mono
                port:
                  number: 9005
          # V1 auth 整体打到 auth Rust 服务
          - path: /api/v1/auth/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 9002
          - path: /(?!api/v1/auth(/|$))(?!api/v2/auth(/|$))(api|hub|live|swagger)/
            pathType: ImplementationSpecific
            backend:
              service:
                name: mono
                port:
                  number: 9005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mono
                port:
                  number: 9005
    - host: au-portal.trademdm.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-portal
                port:
                  number: 80
---
# ============================================================================
#  S3 ExternalName Service — 用于 au-portal.trademdm.com /images/ 反向代理
#  参考 vue nginx.conf 中 proxy_pass https://mm-front-public.s3.ap-southeast-2.amazonaws.com/images/
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: s3-mm-front-public
  labels:
    app: bacera
spec:
  type: ExternalName
  externalName: mm-front-public.s3.ap-southeast-2.amazonaws.com
  ports:
    - name: https
      port: 443
      protocol: TCP
---
# ============================================================================
#  au-portal /images/ → S3 反向代理 Ingress
#  独立 Ingress 以便单独设置 proxy-ssl / rewrite annotations
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bacera-ingress-s3-proxy
  labels:
    app: bacera
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /images/$2
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/upstream-vhost: "mm-front-public.s3.ap-southeast-2.amazonaws.com"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-set-headers: "ingress-nginx/s3-proxy-headers"
spec:
  ingressClassName: nginx
  rules:
    - host: au-portal.trademdm.com
      http:
        paths:
          - path: /images(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: s3-mm-front-public
                port:
                  number: 443
---
# ============================================================================
#  S3 代理自定义 Header — 覆盖 Host 为 S3 bucket hostname
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-proxy-headers
  namespace: ingress-nginx
data:
  Host: "mm-front-public.s3.ap-southeast-2.amazonaws.com"
---
# ============================================================================
#  NATS 监控 UI — https://portal.trademdm.com/nats/
#  代理到 nats:8222，路径 /nats(/|$)(.*) → /$2
#  建议生产环境加 basic-auth Secret 保护
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nats-monitor-ingress
  labels:
    app: nats
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: nats-monitor-auth
    nginx.ingress.kubernetes.io/auth-realm: "NATS Monitor"
spec:
  ingressClassName: nginx
  rules:
    - host: tenant.trademdm.com
      http:
        paths:
          - path: /nats(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: nats
                port:
                  number: 8222
