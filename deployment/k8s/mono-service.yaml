# ============================================================================
#  mono Service — ClusterIP，由 NGINX Ingress 统一暴露
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mono
  labels:
    app: mono
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9005
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50005
      targetPort: grpc
      protocol: TCP
  selector:
    app: mono
