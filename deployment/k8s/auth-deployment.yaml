# ============================================================================
#  auth — Rust 认证服务
#  镜像：docker build --target auth -t auth .
#  端口：9001 (HTTP /connect/token, /api/v2/auth/*, /.well-known/jwks.json)
#        50006 (gRPC AuthValidationService — mono 调用 ValidateToken)
#  依赖：postgres (portal_central), redis
#  环境变量：由 Secret auth-env 注入
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: 961341529237.dkr.ecr.ap-southeast-2.amazonaws.com/auth:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9001
            - name: grpc
              containerPort: 50006
          envFrom:
            - secretRef:
                name: auth-env
          env:
            # NOTE: HTTP_ADDR uses http:// prefix for .NET Kestrel compatibility.
            # Rust auth binary reads this as a socket address (strips prefix in code).
            # Remove http:// prefix after Rust image is live.
            - name: HTTP_ADDR
              value: "http://[::]:9001"
            - name: GRPC_ADDR
              value: "[::]:50006"
            - name: SECURE_COOKIE
              value: "true"
            - name: MONO_GRPC_ADDR
              value: "http://mono:50005"
            - name: RUST_LOG
              value: "info"
            - name: LOG_DIR
              value: "/app/logs"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
