# ============================================================================
#  auth — Rust 认证服务
#  镜像：docker build -f services/auth/Dockerfile -t auth .
#  端口：9001 (HTTP)
#  入口：/connect/token 由 gateway-ingress 路由到此服务
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: 961341529237.dkr.ecr.ap-southeast-2.amazonaws.com/auth:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9001
          envFrom:
            - secretRef:
                name: auth-env
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 5
