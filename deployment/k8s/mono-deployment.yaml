# ============================================================================
#  mono — .NET 8 Gateway Web 服务
#  镜像：docker build --target mono
#  端口：80 (HTTP/1.1 REST)、9000 (HTTP/2 gRPC callback，供 scheduler 回调)
#  依赖：redis (缓存/SignalR)、idgen (gRPC ID 生成)
#  环境变量：由 Secret mono-env 注入，env 块可覆盖
#  入口：由 gateway-ingress.yaml 中的 NGINX Ingress 统一暴露
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mono
  labels:
    app: mono
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mono
  template:
    metadata:
      labels:
        app: mono
    spec:
      containers:
        - name: mono
          image: 961341529237.dkr.ecr.ap-southeast-2.amazonaws.com/mono:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
            - name: grpc
              containerPort: 9000
          envFrom:
            - secretRef:
                name: mono-env
          env:
            # Port 80: HTTP/1.1 for REST/SignalR
            # Port 9000: HTTP/2 for gRPC (MonoCallbackService, called by scheduler)
            - name: Kestrel__Endpoints__Http__Url
              value: "http://+:80"
            - name: Kestrel__Endpoints__Http__Protocols
              value: "Http1"
            - name: Kestrel__Endpoints__Grpc__Url
              value: "http://+:9000"
            - name: Kestrel__Endpoints__Grpc__Protocols
              value: "Http2"
            - name: Grpc__RemoteHello__Address
              value: "http://idgen:50051"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
