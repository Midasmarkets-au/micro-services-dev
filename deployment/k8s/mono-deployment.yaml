# ============================================================================
#  mono — .NET 8 Gateway Web 服务
#  镜像：docker build --target mono
#  端口：9005 (HTTP/1.1 REST/SignalR)、50005 (HTTP/2 gRPC callback，供 scheduler 回调)
#  依赖：redis (缓存/SignalR)、idgen (gRPC ID 生成)
#  环境变量：由 Secret mono-env 注入，env 块可覆盖
#  入口：由 gateway-ingress.yaml 中的 NGINX Ingress 统一暴露
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mono
  labels:
    app: mono
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mono
  template:
    metadata:
      labels:
        app: mono
    spec:
      containers:
        - name: mono
          image: 961341529237.dkr.ecr.ap-southeast-2.amazonaws.com/mono:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9005
            - name: grpc
              containerPort: 50005
          envFrom:
            - secretRef:
                name: mono-env
          env:
            - name: AUTH_GRPC_ADDR
              value: "http://auth:50006"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 9005
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 9005
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 9005
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
