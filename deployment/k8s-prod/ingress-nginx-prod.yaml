# ============================================================================
#  Production 独立 NGINX Ingress Controller
#
#  与 staging 的 ingress-nginx-controller 完全隔离：
#    - IngressClass:  nginx-prod
#    - controller-class: k8s.io/ingress-nginx-prod
#    - election-id:  ingress-nginx-leader-prod
#    - NLB Service:  ingress-nginx-controller-prod
#
#  应用：kubectl apply -f deployment/k8s-prod/ingress-nginx-prod.yaml
# ============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-prod
  namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-prod
  namespace: ingress-nginx
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get]
  - apiGroups: [""]
    resources: [configmaps, pods, secrets, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update]
  - apiGroups: [networking.k8s.io]
    resources: [ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [coordination.k8s.io]
    resourceNames: [ingress-nginx-leader-prod]
    resources: [leases]
    verbs: [get, update]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [list, watch, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-prod
  namespace: ingress-nginx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ingress-nginx-prod
subjects:
  - kind: ServiceAccount
    name: ingress-nginx-prod
    namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-prod
rules:
  - apiGroups: [""]
    resources: [configmaps, endpoints, nodes, pods, secrets, namespaces]
    verbs: [list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update]
  - apiGroups: [networking.k8s.io]
    resources: [ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [list, watch, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ingress-nginx-prod
subjects:
  - kind: ServiceAccount
    name: ingress-nginx-prod
    namespace: ingress-nginx
---
# ============================================================================
#  Production NLB Service — AWS NLB + ACM TLS 终止
#  ACM 证书：portal.midasmkts.com
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller-prod
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: >-
      arn:aws:acm:ap-southeast-2:961341529237:certificate/b72136fc-a987-419b-9827-1a46edfb1517
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
      appProtocol: http
    - name: https
      port: 443
      protocol: TCP
      targetPort: http
      appProtocol: http
---
# ============================================================================
#  Production IngressClass — nginx-prod
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: nginx-prod
spec:
  controller: k8s.io/ingress-nginx-prod
---
# ============================================================================
#  Production Controller Deployment
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx-prod
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx-prod
    app.kubernetes.io/version: 1.10.0
  name: ingress-nginx-controller-prod
  namespace: ingress-nginx
spec:
  minReadySeconds: 0
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: ingress-nginx-prod
      app.kubernetes.io/name: ingress-nginx
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: ingress-nginx-prod
        app.kubernetes.io/name: ingress-nginx
        app.kubernetes.io/part-of: ingress-nginx-prod
        app.kubernetes.io/version: 1.10.0
    spec:
      containers:
        - name: controller
          image: registry.k8s.io/ingress-nginx/controller:v1.10.0@sha256:42b3f0e5d0846876b1791cd3afeb5f1cbbe4259d6f35651dcc1b5c980925379c
          imagePullPolicy: IfNotPresent
          args:
            - /nginx-ingress-controller
            - --publish-service=$(POD_NAMESPACE)/ingress-nginx-controller-prod
            - --election-id=ingress-nginx-leader-prod
            - --controller-class=k8s.io/ingress-nginx-prod
            - --ingress-class=nginx-prod
            - --configmap=$(POD_NAMESPACE)/ingress-nginx-controller
            - --enable-metrics=false
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LD_PRELOAD
              value: /usr/local/lib/libmimalloc.so
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - /wait-shutdown
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 10254
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 10254
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 100m
              memory: 90Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            seccompProfile:
              type: RuntimeDefault
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: ingress-nginx-prod
      terminationGracePeriodSeconds: 300
