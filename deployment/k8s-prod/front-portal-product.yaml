# ============================================================================
#  front-portal-product — Next.js Production 客户门户
#  镜像：docker build -f app/web/react/Dockerfile app/web/react
#  端口：3000 (HTTP, Next.js standalone)
#  入口：portal.midasmkts.com / 由 gateway-ingress 路由到此服务
#  Namespace：production
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-portal-product
  namespace: production
  labels:
    app: front-portal-product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-portal-product
  template:
    metadata:
      labels:
        app: front-portal-product
    spec:
      containers:
        - name: front-portal-product
          image: 961341529237.dkr.ecr.ap-southeast-2.amazonaws.com/front-portal-product:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1024Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ============================================================================
#  front-portal-product Service — ClusterIP，由 NGINX Ingress 统一暴露
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: front-portal-product
  namespace: production
  labels:
    app: front-portal-product
spec:
  type: ClusterIP
  selector:
    app: front-portal-product
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
