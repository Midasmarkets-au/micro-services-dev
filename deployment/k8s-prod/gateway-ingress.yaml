# ============================================================================
#  Production NGINX Ingress — portal.midasmkts.com / vu.midasmkts.com
#
#  前置条件：
#    kubectl apply -f deployment/k8s-prod/ingress-nginx-prod.yaml
#
#  架构说明：
#    后端 API 由 Next.js 服务端直接请求外部 https://api.midasmkts.net
#    Ingress 只负责把流量送到 front-portal-product
#
#  IngressClass：nginx-prod（独立 controller，见 ingress-nginx-prod.yaml）
#  Namespace：production
# ============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: midasmkts-ingress
  namespace: production
  labels:
    app: midasmkts
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx-prod
  rules:
    - host: portal.midasmkts.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-portal-product
                port:
                  number: 80
    # 临时测试域名（vu.midasmkts.com ACM 已 ISSUED）
    - host: vu.midasmkts.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-portal-product
                port:
                  number: 80
    # NLB 直连测试入口（HTTP only）
    - host: k8s-ingressn-ingressn-d9fbebf220-740d31339032cd06.elb.ap-southeast-2.amazonaws.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-portal-product
                port:
                  number: 80
